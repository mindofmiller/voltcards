<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Volt's Pokédex</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%2024%2024'%3E%3Crect%20width='24'%20height='24'%20rx='5'%20fill='%230b1f4d'/%3E%3Cpath%20d='M14%202%20L5%2013%20h5%20l-1%209%209-12%20h-5%20z'%20fill='%23ffd23f'/%3E%3C/svg%3E">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.5.0/dist/chart.umd.js" integrity="sha384-iU8HYtnGQ8Cy4zl7gbNMOhsDTTKX02BTXptVP/vqAWIaTfM7isw76iyZCsjL2eVi" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.4/dist/umd/supabase.min.js"></script>
<style>
:root{
  color-scheme: light;
  --bg:#f6f7fb; --panel:#ffffff; --ink:#1a2233; --muted:#6b7488; --line:#e4e7ef;
  --accent:#3b5bdb; --good:#2f9e57; --goodbg:#e7f6ec; --warn:#c98a00; --bad:#d1435b;
  --op:#e8590c; --pk:#3b5bdb; --mg:#7048e8; --chip:#eef1f8;
}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--ink);font:13px/1.45 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif}
.wrap{padding:16px;max-width:1400px;margin:0 auto}
h1{font-size:18px;margin:0 0 2px}
.sub{color:var(--muted);font-size:12px;margin-bottom:14px}
.row{display:flex;flex-wrap:wrap;gap:10px}
.card{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:12px 14px}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin-bottom:14px}
.stat .k{color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.04em}
.stat .v{font-size:22px;font-weight:700;margin-top:2px}
.stat .s{font-size:11px;color:var(--muted)}
.controls{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px;margin-bottom:14px}
.rng{display:flex;align-items:center;gap:6px}
.rng input{min-width:0}
.rng span{color:var(--muted)}
label.fld{display:block;font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.03em;margin-bottom:5px}
select,input[type=number],input[type=text]{width:100%;padding:7px 9px;border:1px solid var(--line);border-radius:8px;background:#fff;color:var(--ink);font-size:13px}
.chips{display:flex;flex-wrap:wrap;gap:6px}
.chip{padding:5px 10px;border:1px solid var(--line);border-radius:999px;background:var(--chip);cursor:pointer;user-select:none;font-size:12px}
.chip.on{background:var(--accent);border-color:var(--accent);color:#fff}
.toggles{display:flex;flex-wrap:wrap;gap:14px;align-items:center}
.tg{display:flex;gap:6px;align-items:center;cursor:pointer;font-size:12px}
.chartbox{height:340px;position:relative}
.tablewrap{overflow:auto;max-height:560px;border:1px solid var(--line);border-radius:10px}
table{border-collapse:collapse;width:100%;font-size:12px;background:#fff}
th,td{padding:7px 9px;text-align:right;white-space:nowrap;border-bottom:1px solid var(--line)}
th:nth-child(-n+3),td:nth-child(-n+3){text-align:left}
th{position:sticky;top:0;background:#f0f2f8;cursor:pointer;user-select:none;font-size:11px;text-transform:uppercase;letter-spacing:.03em;color:var(--muted);z-index:1}
th.sort::after{content:" \2195";opacity:.4}
th.asc::after{content:" \2191";opacity:.9}
th.desc::after{content:" \2193";opacity:.9}
/* clip cell text to its own column so long values don't overlap the next column */
#tbl td,.ptbl td{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cardimg{text-align:center;margin-bottom:10px}
.cardimg img{max-height:230px;max-width:100%;border-radius:10px;box-shadow:0 4px 14px rgba(0,0,0,.12)}
tr.out td{background:var(--goodbg)}
tr.out td:first-child{box-shadow:inset 3px 0 0 var(--good)}
.g-op{color:var(--op)}.g-pokemon{color:var(--pk)}.g-magic{color:var(--mg)}
.dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:6px;vertical-align:middle}
.pos{color:var(--good)}.neg{color:var(--bad)}
.pill{font-size:11px;padding:1px 7px;border-radius:999px;background:var(--chip)}
.muted{color:var(--muted)}
.err{color:var(--bad);padding:10px}
.legend{display:flex;gap:14px;font-size:12px;color:var(--muted);margin:8px 2px}
.legend span{display:flex;align-items:center}
footer{color:var(--muted);font-size:11px;margin-top:12px}
tbody tr{cursor:pointer}
tbody tr:hover td{background:#eef3ff}
tr.out:hover td{background:#dff0e4}
.seasons{display:flex;gap:6px;margin-bottom:12px}
.seasons .chip{font-weight:600}
/* sidebar */
#ov{position:fixed;inset:0;background:rgba(20,26,40,.28);opacity:0;pointer-events:none;transition:.15s;z-index:40}
#ov.on{opacity:1;pointer-events:auto}
#side{position:fixed;top:0;right:0;height:100%;width:min(420px,92vw);background:var(--panel);border-left:1px solid var(--line);
  box-shadow:-8px 0 24px rgba(20,26,40,.12);transform:translateX(100%);transition:.18s;z-index:50;display:flex;flex-direction:column}
#side.on{transform:none}
#side header{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;padding:14px 16px;border-bottom:1px solid var(--line)}
#side header h2{font-size:15px;margin:0}
#side .close{border:none;background:var(--chip);border-radius:8px;width:28px;height:28px;cursor:pointer;font-size:16px;line-height:1}
#side .body{padding:14px 16px;overflow:auto}
.kv{display:grid;grid-template-columns:auto 1fr;gap:4px 12px;font-size:12px;margin-bottom:14px}
.kv .k{color:var(--muted)}
.kv .v{text-align:right;font-variant-numeric:tabular-nums}
.ebtn{display:flex;align-items:center;gap:8px;width:100%;text-decoration:none;color:var(--ink);border:1px solid var(--line);
  border-radius:9px;padding:9px 11px;margin-bottom:8px;background:#fff;font-size:13px;cursor:pointer}
.ebtn:hover{background:#f4f6fc;border-color:#c9d2ea}
.ebtn.primary{background:var(--accent);color:#fff;border-color:var(--accent);justify-content:center;font-weight:600}
.ebtn small{color:var(--muted)}
.ebtn.primary small{color:#dfe6ff}
.note{font-size:11px;color:var(--muted);margin:10px 0 4px;line-height:1.5}
/* tracking + favorites */
.star{cursor:pointer;color:#c9a100;font-size:15px;padding:0 2px;line-height:1}
.star:not(.on){color:#c2c8d6}
.statuscell{display:flex;gap:6px;justify-content:flex-end;align-items:center}
.stg{font-size:10px;padding:1px 6px;border-radius:999px;background:var(--chip);color:var(--muted);white-space:nowrap}
.stg.s-purchased{background:#e7edff;color:#3b5bdb}
.stg.s-psa{background:#fff2d9;color:#b7791f}
.stg.s-listed{background:#efe6ff;color:#6b46c1}
.stg.s-sold{background:#e7f6ec;color:#2f9e57}
.track{border-top:1px solid var(--line);margin-top:12px;padding-top:12px}
.track h3{font-size:12px;text-transform:uppercase;letter-spacing:.04em;color:var(--muted);margin:0 0 10px}
.trow{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;font-size:13px}
.favbtn{width:100%;border:1px solid var(--line);background:#fff;border-radius:9px;padding:9px;cursor:pointer;font-size:13px;font-weight:600;margin-bottom:12px}
.favbtn.on{background:#fff7e0;border-color:#e6c34d;color:#8a6d00}
.favbtn.valon{background:#eef7ff;border-color:#7fb3e6;color:#1c5a99}
.valmark{cursor:pointer;margin-right:4px}
.stepper{display:flex;align-items:center;gap:6px}
.stepper button{width:28px;height:28px;border:1px solid var(--line);background:#fff;border-radius:7px;cursor:pointer;font-size:15px}
.stepper input{width:54px;text-align:center}
.stages{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:4px}
.stage{border:1px solid var(--line);background:#fff;border-radius:8px;padding:8px;cursor:pointer;font-size:12px;text-align:left}
.stage.done{background:#eef3ff;border-color:#c9d6f7}
.stage.cur{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:600}
.clr{background:none;border:none;color:var(--muted);font-size:11px;cursor:pointer;margin-top:8px;text-decoration:underline}
.authbar{display:flex;justify-content:flex-end;align-items:center;gap:8px;margin:-4px 0 10px;font-size:12px;flex-wrap:wrap}
.authbar .ain{width:190px;padding:6px 8px;border:1px solid var(--line);border-radius:8px}
.authbar .abtn{padding:6px 10px;border:1px solid var(--accent);background:var(--accent);color:#fff;border-radius:8px;cursor:pointer;font-size:12px}
.pbtn{margin-left:auto;padding:5px 12px;border:1px solid var(--accent);background:#fff;color:var(--accent);border-radius:999px;cursor:pointer;font-size:12px;font-weight:600}
.pbtn:hover{background:var(--accent);color:#fff}
.povl{position:fixed;inset:0;background:rgba(20,26,40,.28);opacity:0;pointer-events:none;transition:.15s;z-index:60}
.povl.on{opacity:1;pointer-events:auto}
#pmodal,#fmodal{position:fixed;top:4vh;left:50%;transform:translateX(-50%) translateY(-20px);width:min(1000px,94vw);max-height:92vh;background:var(--panel);border:1px solid var(--line);border-radius:12px;box-shadow:0 20px 60px rgba(20,26,40,.25);z-index:70;display:none;flex-direction:column;opacity:0;transition:.15s}
#pmodal.on,#fmodal.on{display:flex;opacity:1;transform:translateX(-50%) translateY(0)}
#pmodal header,#fmodal header{display:flex;justify-content:space-between;align-items:center;padding:14px 16px;border-bottom:1px solid var(--line)}
#pmodal header h2,#fmodal header h2{margin:0;font-size:15px}
#pmodal .close,#fmodal .close{border:none;background:var(--chip);border-radius:8px;width:28px;height:28px;cursor:pointer;font-size:16px}
.pbody{padding:14px 16px;overflow:auto}
.psum{display:flex;gap:18px;flex-wrap:wrap;font-size:13px;margin-bottom:12px;font-weight:600}
.ptbl th{position:sticky;top:0}
.phdr{display:flex;gap:8px;align-items:center}
#pmodal tbody tr,#fmodal tbody tr{cursor:pointer}
#pmodal tbody tr:hover td,#fmodal tbody tr:hover td{background:#eef3ff}
.addform{padding:12px 16px;border-bottom:1px solid var(--line);background:#fafbff}
.addform .ain2{padding:7px 9px;border:1px solid var(--line);border-radius:8px;font-size:13px}
.addform #acard,.addform #abulktext{width:100%;margin-bottom:4px}
.addform .arow{display:flex;gap:8px;margin-top:8px;flex-wrap:wrap;align-items:center}
.amode{display:flex;gap:6px;margin-bottom:10px}
.amode button{padding:5px 12px;border:1px solid var(--line);background:#fff;border-radius:999px;cursor:pointer;font-size:12px}
.amode button.on{background:var(--accent);color:#fff;border-color:var(--accent)}
.prov{font-size:11px;color:var(--muted);line-height:1.5;margin:0 0 12px;padding:8px 10px;background:#f7f9fd;border:1px solid var(--line);border-radius:8px}
.langbadge{display:inline-block;font-weight:700;font-size:10px;padding:1px 6px;border-radius:5px;background:#e7edff;color:#3b5bdb;margin-right:4px}
.langbadge.jp{background:#ffe9e9;color:#c0392b}
.lowc{color:#c98a00;font-weight:600}
.okc{color:var(--good)}
.ebtn.inacon{background:#fdeaea;border-color:#e6b3b3;color:#c0392b;justify-content:center}
.dcbox{border:1px solid var(--line);border-radius:9px;padding:10px;margin:6px 0 8px;background:#f7f9fd}
.dcbox .arow{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-top:6px}
/* Let's buy! modal + listing sidebar */
#bmodal{position:fixed;top:4vh;left:50%;transform:translateX(-50%) translateY(-20px);width:min(1050px,95vw);max-height:92vh;background:var(--panel);border:1px solid var(--line);border-radius:12px;box-shadow:0 20px 60px rgba(20,26,40,.25);z-index:70;display:none;flex-direction:column;opacity:0;transition:.15s}
#bmodal.on{display:flex;opacity:1;transform:translateX(-50%) translateY(0)}
#bmodal header{display:flex;justify-content:space-between;align-items:center;padding:14px 16px;border-bottom:1px solid var(--line)}
#bmodal header h2{margin:0;font-size:15px}
#bmodal .close{border:none;background:var(--chip);border-radius:8px;width:28px;height:28px;cursor:pointer;font-size:16px}
.bkt{display:inline-block;min-width:26px;text-align:center;padding:1px 6px;border-radius:6px;background:var(--chip);font-variant-numeric:tabular-nums}
.bkt.hot{background:#e7f6ec;color:#2f9e57;font-weight:700}
#lov{position:fixed;inset:0;background:rgba(20,26,40,.4);opacity:0;pointer-events:none;transition:.15s;z-index:80}
#lov.on{opacity:1;pointer-events:auto}
#lside{position:fixed;top:0;right:0;height:100%;width:min(440px,94vw);background:var(--panel);border-left:1px solid var(--line);box-shadow:-8px 0 24px rgba(20,26,40,.2);transform:translateX(100%);transition:.18s;z-index:90;display:flex;flex-direction:column}
#lside.on{transform:none}
#lside header{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;padding:14px 16px;border-bottom:1px solid var(--line)}
#lside header h2{font-size:15px;margin:0}
#lside .close{border:none;background:var(--chip);border-radius:8px;width:28px;height:28px;cursor:pointer;font-size:16px;line-height:1}
#lside .body{padding:14px 16px;overflow:auto}
.notint{border:none;background:#fdeaea;color:#c0392b;border-radius:8px;padding:10px;cursor:pointer;font-size:13px;font-weight:600;width:100%;margin-top:8px}
.notint:hover{background:#f9d5d5}
/* gallery mode */
#gmodal{position:fixed;top:3vh;left:50%;transform:translateX(-50%) translateY(-20px);width:min(1100px,96vw);max-height:94vh;background:var(--panel);border:1px solid var(--line);border-radius:12px;box-shadow:0 20px 60px rgba(20,26,40,.25);z-index:100;display:none;flex-direction:column;opacity:0;transition:.15s}
#gmodal.on{display:flex;opacity:1;transform:translateX(-50%) translateY(0)}
#gmodal header{display:flex;justify-content:space-between;align-items:center;padding:14px 16px;border-bottom:1px solid var(--line)}
#gmodal header h2{margin:0;font-size:15px}
#gmodal .close{border:none;background:var(--chip);border-radius:8px;width:28px;height:28px;cursor:pointer;font-size:16px}
#gov{position:fixed;inset:0;background:rgba(20,26,40,.45);opacity:0;pointer-events:none;transition:.15s;z-index:95}
#gov.on{opacity:1;pointer-events:auto}
.ggrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:14px}
.gcard{border:1px solid var(--line);border-radius:10px;overflow:hidden;background:#fff;display:flex;flex-direction:column}
.gcard.gone{opacity:.35;filter:grayscale(1)}
.gcard .gimg{aspect-ratio:3/4;background:#eef1f8;display:flex;align-items:center;justify-content:center}
.gcard .gimg img{width:100%;height:100%;object-fit:cover}
.gcard .gmeta{padding:8px 10px}
.gcard .gprice{font-weight:700;font-size:14px}
.gcard .gtime{font-size:11px;color:var(--muted);margin-top:2px}
.gbtns{display:flex;gap:0;border-top:1px solid var(--line);margin-top:auto}
.gbtns button{flex:1;border:none;background:#fff;padding:9px 6px;cursor:pointer;font-size:12px;font-weight:600}
.gbtns .gignore{color:#c0392b;border-right:1px solid var(--line)}
.gbtns .gignore:hover{background:#fdeaea}
.gbtns .gbuy{color:#1c5a99}
.gbtns .gbuy:hover{background:#eef3ff}
.gbtn{padding:3px 8px;font-size:12px}
/* top nav (Discover / Buy) + Buy sub-tabs */
.topnav{display:flex;gap:8px;margin:2px 0 12px}
.navbtn{padding:8px 20px;border:1px solid var(--line);background:#fff;border-radius:10px;cursor:pointer;font-size:14px;font-weight:700;color:var(--muted)}
.navbtn.on{background:var(--accent);border-color:var(--accent);color:#fff}
.buytabs{display:flex;gap:8px;margin:2px 0 14px}
.subtab{padding:6px 16px;border:1px solid var(--line);background:#fff;border-radius:999px;cursor:pointer;font-size:13px;font-weight:600;color:var(--muted)}
.subtab.on{background:#1a2233;border-color:#1a2233;color:#fff}
</style>
</head>
<body>
<div class="wrap">
  <div style="display:flex;align-items:center;gap:16px;margin:2px 0 8px"><img src="volt-logo.png" alt="Volt's Pokédex" style="height:104px;width:auto;display:block"><span style="font-size:20px;font-weight:700;color:#1a2233;letter-spacing:.01em">Volt's Pokédex</span></div>
  <div id="authbar" class="authbar"></div>
  <div class="topnav" id="topnav">
    <button class="navbtn on" data-view="discover">🔍 Discover</button>
    <button class="navbtn" data-view="buy">🛒 Buy</button>
  </div>

  <div id="discoverView">
  <div class="sub" id="sub">Loading…</div>

  <div class="seasons" id="seasons">
    <span class="chip" data-season="2026">2026 sets</span>
    <span class="chip" data-season="2025">2025 sets</span>
    <span class="chip" data-season="2024">2024 sets</span>
    <span class="chip" data-season="2023">2023 sets</span>
    <button id="favBtnTop" class="pbtn">⭐ Favorites</button>
  </div>
  <div class="topsearch" style="margin:10px 0 4px"><input type="text" id="q" placeholder="🔍 Search name / parallel / #  —  any order (e.g. luffy voyage 55)" style="width:100%;padding:11px 14px;font-size:15px;border:1px solid #d6d9e6;border-radius:10px;box-sizing:border-box"></div>
  <!-- overlays relocated below (outside the Discover/Buy view containers so they show on any page) -->

  <div class="card" style="margin-bottom:14px">
    <div id="filterHdr" style="display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none">
      <span style="font-weight:600;font-size:13px">🔎 Filters</span>
      <span id="filterCaret" class="muted" style="font-size:12px">▾ Hide</span>
    </div>
    <div id="filterBody" style="margin-top:10px">
    <div class="controls">
      <div>
        <label class="fld">Snapshot week</label>
        <select id="dateSel"></select>
      </div>
      <div>
        <label class="fld">Set</label>
        <select id="setSel"></select>
      </div>
      <div>
        <label class="fld">Game</label>
        <div class="chips" id="gameChips"></div>
      </div>
      <div>
        <label class="fld">Min. profit ($)</label>
        <input type="number" id="profMin" value="0" step="10">
      </div>
      <div>
        <label class="fld">Min volume (liquidity)</label>
        <input type="number" id="volT" value="0" step="25">
      </div>
      <div>
        <label class="fld">Raw price ($)</label>
        <div class="rng"><input type="number" id="rawMin" placeholder="min" step="1"><span>–</span><input type="number" id="rawMax" placeholder="max" step="1"></div>
      </div>
      <div>
        <label class="fld">PSA 10 price ($)</label>
        <div class="rng"><input type="number" id="p10Min" placeholder="min" step="1"><span>–</span><input type="number" id="p10Max" placeholder="max" step="1"></div>
      </div>
    </div>
    <div class="toggles" style="margin-top:6px">
      <label class="tg"><input type="checkbox" id="liq" checked> Liquidity filter (PSA10 ≤ 5×PSA9)</label>
      <label class="tg"><input type="checkbox" id="lowConfHide"> Hide low-confidence prices</label>
      <label class="tg"><input type="checkbox" id="hideInac"> Hide inaccurate-tagged</label>
      <label class="tg"><input type="checkbox" id="valueOnly"> ⏳ Value only</label>
      <label class="tg"><input type="checkbox" id="hideUn" checked> Hide unpriced</label>
      <button class="pbtn" id="clearBtn" style="margin-left:auto">✕ Clear all filters</button>
    </div>
    </div>
  </div>

  <div class="card" style="margin-bottom:14px;padding:0">
    <div style="display:flex;justify-content:flex-end;align-items:center;padding:8px 10px 4px">
      <div class="pcolwrap"><button class="pbtn" id="mcolBtn">⚙ Columns ▾</button><div class="pcmenu" id="mcolMenu" style="display:none"></div></div>
    </div>
    <div class="tablewrap"><table id="tbl"><thead></thead><tbody></tbody></table></div>
  </div>

  <div class="card" style="margin-bottom:14px">
    <div class="legend">
      <span><span class="dot" style="background:var(--pk)"></span>Pokémon</span>
      <span><span class="dot" style="background:var(--op)"></span>One Piece</span>
      <span><span class="dot" style="background:var(--mg)"></span>Magic</span>
      <span class="muted">— larger points = more graded (population). Dashed line = min-profit filter.</span>
    </div>
    <div class="chartbox"><canvas id="scatter"></canvas></div>
  </div>
  <footer id="foot"></footer>
  </div><!-- /discoverView -->

  <div id="buyView" style="display:none">
    <div class="buytabs">
      <button class="subtab on" id="subLetsBuy" data-sub="letsbuy">🛒 Let's Buy</button>
      <button class="subtab" id="subPurchased" data-sub="purchased">📦 Purchased</button>
    </div>
    <div id="buyLetsBuy"><div class="pbody" id="bbody" style="padding:0"></div></div>
    <div id="buyPurchased" style="display:none">
      <div style="display:flex;justify-content:flex-end;margin-bottom:8px"><button id="addPurchaseBtn" class="pbtn">➕ Add purchase</button></div>

// Recursively locate the rows array regardless of how the connector nests/wraps it.
function findRows(x,depth){
  if(x==null||depth>6) return null;
  if(looksLikeRows(x)) return x;
  if(Array.isArray(x)){ for(const it of x){ const r=findRows(it,depth+1); if(r) return r; } return null; }
  if(typeof x==="string"){
    let o=null; try{o=JSON.parse(x);}catch(_){}
    if(o){ const r=findRows(o,depth+1); if(r) return r; }
    const s=x.indexOf("["), e=x.lastIndexOf("]");
    if(s>=0&&e>s){ try{ const r=findRows(JSON.parse(x.slice(s,e+1)),depth+1); if(r) return r; }catch(_){} }
    const m=x.match(/<untrusted-data[^>]*>([\s\S]*?)<\/untrusted-data/);
    if(m){ try{ const r=findRows(JSON.parse(m[1].trim()),depth+1); if(r) return r; }catch(_){} }
    return null;
  }
  if(typeof x==="object"){ for(const k in x){ const r=findRows(x[k],depth+1); if(r) return r; } }
  return null;
}

function enrich(r){
  const gr=num(r.gem_rate), raw=num(r.raw), p9=num(r.psa9), p10=num(r.psa10);
  const priced = raw!=null && p9!=null && p10!=null && p9>0;
  let profit=null, roi=null, liqOk=false;
  if(priced){
    const cost = costFor(raw);
    profit=(gr*p10 + (1-gr)*p9)*0.88 - cost - raw;
    roi = profit/(raw + cost);
    liqOk = p10 <= 5*p9;
  }
  return Object.assign({}, r, {gr,raw,p9,p10,priced,profit,roi,liqOk,
    score:(profit!=null&&roi!=null)?profit*roi:-1e9, d10:num(r.psa10_chg)});
}

    if(st.set!=="__all" && x.set_name!==st.set) return false;
    if(st.hideUn && !x.priced) return false;
    if(st.liq && x.priced && !x.liqOk) return false;
    if(st.lowConfHide && x.price_confidence==="low") return false;
    if(st.hideInac && isInac(x)) return false;
    if(st.valueOnly && !isValue(x)) return false;
    if(num(x.volume)!=null && num(x.volume) < st.volT) return false;
    if(st.rawMin!=null){ if(x.raw==null || x.raw < st.rawMin) return false; }
    if(st.rawMax!=null){ if(x.raw==null || x.raw > st.rawMax) return false; }
    if(st.p10Min!=null){ if(x.p10==null || x.p10 < st.p10Min) return false; }
    if(st.p10Max!=null){ if(x.p10==null || x.p10 > st.p10Max) return false; }
    if(st.profMin>0){ if(!x.priced || x.profit < st.profMin) return false; }
    if(st.q){ const toks=st.q.toLowerCase().split(/\s+/).filter(Boolean); const s=((x.name||"")+" "+(x.parallel||"")+" "+(x.card_number||"")).toLowerCase(); if(!toks.every(t=>s.includes(t))) return false; }
    return true;
  });
}

const PCOLS="snapshot_date,season,game,set_name,card_number,name,parallel,lang,pc_console,pc_product,price_confidence,gems,total,gem_rate,raw,psa9,psa10,volume,source,raw_chg,psa9_chg,psa10_chg,prev_date";
async function seasonLatest(yr){ const d=await rest(`price_snapshots?season=eq.${yr}&select=snapshot_date&order=snapshot_date.desc&limit=1`); return d[0]&&d[0].snapshot_date; }
async function fetchSeason(yr,date){ return rest(`price_changes?season=eq.${yr}&snapshot_date=eq.${date}&select=${PCOLS}&order=total.desc&limit=6000`); }

async function ensureDates(yr){
  const dsel=document.getElementById("dateSel");
  const draw=await rest(`price_snapshots?season=eq.${yr}&select=snapshot_date&order=snapshot_date.desc&limit=100000`);
  const dates=[...new Set(draw.map(r=>r.snapshot_date))];
  dsel.innerHTML=dates.map(d=>`<option value="${d}">${d}</option>`).join("");
  if(!dates.includes(st.date)) st.date=dates[0]||null;
  dsel.value=st.date; save();
}
async function loadDate(){
  if(st.seasons.length!==1) return loadSeason();
  const data=await fetchSeason(st.seasons[0], st.date);
  RAW=data.map(enrich); buildGameChips(); buildSetOptions();
  document.getElementById("sub").textContent=`${RAW.length} cards · ${st.seasons[0]} · ${st.date||"—"}`;
  render();
}
async function loadSeason(){
  const dwrap=document.getElementById("dateSel").parentElement;
  const single=st.seasons.length===1;
  dwrap.style.display=single?"":"none";
  let all=[];
  if(single){
    const yr=st.seasons[0];
    await ensureDates(yr);
    if(st.date) all=await fetchSeason(yr, st.date);
  } else {
    for(const yr of st.seasons){ const dt=await seasonLatest(yr); if(dt) all=all.concat(await fetchSeason(yr, dt)); }
  }
  RAW=all.map(enrich); buildGameChips(); buildSetOptions();
  document.getElementById("sub").textContent=`${RAW.length} cards · ${st.seasons.join(" + ")}`+(single&&st.date?` · ${st.date}`:"");
  render();
}

function buildSeasonChips(){
  document.querySelectorAll("#seasons .chip").forEach(c=>{
    c.classList.toggle("on", st.seasons.includes(c.dataset.season));
    c.onclick=async()=>{ const y=c.dataset.season;
      if(st.seasons.includes(y)){ if(st.seasons.length>1) st.seasons=st.seasons.filter(x=>x!==y); }
      else st.seasons.push(y);
      st.set="__all"; save(); buildSeasonChips();
      try{ await loadSeason(); }catch(e){ document.getElementById("sub").innerHTML=`<span class="err">${e.message}</span>`; } };
  });
}

// drag-to-resize table columns (adds a grab handle to each header cell)
function makeResizable(table,onResize){
  if(!table) return;
  if(!document.getElementById("colresize-css")){
    const s=document.createElement("style"); s.id="colresize-css";
    s.textContent=".colresize{position:absolute;top:0;right:0;width:9px;height:100%;cursor:col-resize;user-select:none;z-index:2}.colresize:hover{background:rgba(90,110,255,.35)}";
    document.head.appendChild(s);
  }
  const ths=[...table.querySelectorAll("thead th")];
  const widths=ths.map(th=>th.offsetWidth);
  table.style.tableLayout="fixed";
  table.style.width=widths.reduce((a,b)=>a+b,0)+"px";
  ths.forEach((th,i)=>{
    th.style.width=widths[i]+"px"; if(getComputedStyle(th).position==="static") th.style.position="relative";
    const h=document.createElement("div"); h.className="colresize"; th.appendChild(h);
    let sx,sw;
    const mm=ev=>{ th.style.width=Math.max(40,sw+(ev.pageX-sx))+"px"; };
    const mu=()=>{ document.removeEventListener("mousemove",mm); document.removeEventListener("mouseup",mu); document.body.style.cursor=""; if(onResize&&th.dataset.key) onResize(th.dataset.key, th.offsetWidth); };
    h.addEventListener("mousedown",e=>{ sx=e.pageX; sw=th.offsetWidth; document.body.style.cursor="col-resize"; e.preventDefault(); e.stopPropagation(); document.addEventListener("mousemove",mm); document.addEventListener("mouseup",mu); });
    h.addEventListener("click",e=>e.stopPropagation());
  });
}

  s.textContent=".ptools{display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:8px}.pcolwrap{position:relative}.pcmenu{position:absolute;right:0;top:110%;background:#fff;border:1px solid #d6d9e6;border-radius:10px;box-shadow:0 8px 24px rgba(0,0,0,.14);padding:8px;z-index:30;min-width:180px}.pcitem{display:flex;align-items:center;gap:8px;padding:4px 6px;font-size:14px;cursor:pointer;border-radius:6px}.pcitem:hover{background:#f2f4fb}.pchint{font-size:11px;color:#8890a6;padding:2px 6px 6px}.ptbl th[data-key]{cursor:grab}.ptbl th[data-key]:active{cursor:grabbing}";
  document.head.appendChild(s); }

function renderPurchases(rows){
  const body=document.getElementById("pbody");
  pcolStyle();
  PURCH_ROWS=rows;
  if(!rows.length){ body.innerHTML='<p class="note">No purchased cards yet. eBay buys are matched and appear here automatically.</p>'; return; }
  rows.forEach(r=>{ r.paidN=+r.paid||0; r.profitN=(r.est_profit==null?null:+r.est_profit); });
  const gmap={};
  rows.forEach(r=>{ const k=[r.game,r.set_name,r.card_number,r.parallel].join("¦")||("t:"+(r.item_title||"")); (gmap[k]||(gmap[k]={items:[]})).items.push(r); });
  const groups=Object.values(gmap).map(g=>{
    const items=g.items.slice().sort((a,b)=>String(a.txn_date||"").localeCompare(String(b.txn_date||"")));
    const qty=items.length, avgPaid=items.reduce((s,r)=>s+r.paidN,0)/qty;
    const profs=items.map(r=>r.profitN).filter(v=>v!=null);
    const avgProf=profs.length?profs.reduce((s,v)=>s+v,0)/profs.length:null;   // est_profit is linear in paid
    const roi=(avgProf!=null&&avgPaid>0)?avgProf/avgPaid:null;
    return {items,qty,avgPaid,avgProf,roi,rep:items[0],first:items[0].txn_date};
  });
  groups.sort((a,b)=>((b.avgProf==null?-1e9:b.avgProf)-(a.avgProf==null?-1e9:a.avgProf)));
  PURCH=groups;
  const spent=rows.reduce((s,r)=>s+r.paidN,0), proj=rows.reduce((s,r)=>s+(r.profitN||0),0);
  const priced=rows.filter(r=>r.profitN!=null);   // both PSA9 + PSA10 known
  const allP9=priced.reduce((s,r)=>s+(+r.psa9*0.88-costFor(r.paidN)-r.paidN),0);   // worst case: every card grades PSA 9
  const allP10=priced.reduce((s,r)=>s+(+r.psa10*0.88-costFor(r.paidN)-r.paidN),0); // best case: every card grades PSA 10
  const gemsA=priced.map(r=>Math.min(1,Math.max(0,+r.gem_rate||0)));
  const avgGem=gemsA.length?gemsA.reduce((s,g)=>s+g,0)/gemsA.length:null;
  // Monte Carlo: probability the realized profit meets or beats the expected estimate
  let pHit=null;
  if(priced.length){
    const p10=priced.map(r=>+r.psa10*0.88-costFor(r.paidN)-r.paidN), p9=priced.map(r=>+r.psa9*0.88-costFor(r.paidN)-r.paidN);
    const T=20000; let hits=0;
    for(let t=0;t<T;t++){ let s=0; for(let i=0;i<gemsA.length;i++) s+=(Math.random()<gemsA[i])?p10[i]:p9[i]; if(s>=proj-1e-6) hits++; }
    pHit=hits/T;
  }
  const T={totQty:groups.reduce((s,g)=>s+g.qty,0), spent, totPSA9:groups.reduce((s,g)=>s+((+g.rep.psa9||0)*g.qty),0), totPSA10:groups.reduce((s,g)=>s+((+g.rep.psa10||0)*g.qty),0), proj, totRoi:spent>0?proj/spent:null};
  const cols=PL.order.map(k=>PCOLDEF.find(c=>c.key===k)).filter(c=>c && !PL.hidden[c.key]);

  const menu=PL.order.map(k=>{ const c=PCOLDEF.find(x=>x.key===k); return `<label class="pcitem"><input type="checkbox" data-col="${k}" ${PL.hidden[k]?"":"checked"}> ${c.label}</label>`; }).join("");
  let h=`<div class="ptools"><div class="psum"><span>${rows.length} cards · ${groups.length} unique</span><span>Spent: ${money2(spent)}</span><span title="Simulated chance the actual outcome meets or beats this estimate (each card gems independently at its gem rate)">Est. profit if graded/sold: <span class="${proj>=0?'pos':'neg'}">${money2(proj)}</span> <span class="muted">(avg gem ${avgGem==null?'—':Math.round(avgGem*100)+'%'} · ${pHit==null?'—':Math.round(pHit*100)+'%'} chance to hit or beat)</span></span><span title="If every card graded PSA 9">Worst case · all PSA 9: <span class="${allP9>=0?'pos':'neg'}">${money2(allP9)}</span></span><span title="If every card graded PSA 10">Best case · all PSA 10: <span class="${allP10>=0?'pos':'neg'}">${money2(allP10)}</span></span></div>`;
  h+=`<div class="pcolwrap"><button class="pbtn" id="pcolBtn">⚙ Columns ▾</button><div class="pcmenu" id="pcolMenu" style="display:none"><div class="pchint">Show / hide · drag headers to reorder</div>${menu}<button class="pbtn" id="pcolReset" style="margin-top:6px;width:100%">Reset layout</button></div></div></div>`;

  h+='<div class="tablewrap"><table class="ptbl"><thead><tr><th class="pcx"></th>'+cols.map(c=>`<th draggable="true" data-key="${c.key}"${PL.widths[c.key]?` style="width:${PL.widths[c.key]}px"`:""}>${c.label}</th>`).join("")+'</tr></thead><tbody>';
  h+=`<tr class="ptot" style="font-weight:600;background:#eef1fb"><td></td>`+cols.map(c=>`<td>${c.key==="card"?`TOTALS <span class="muted">(${groups.length} unique)</span>`:(c.t?c.t(T):"")}</td>`).join("")+`</tr>`;
  groups.forEach((g,gi)=>{
    const caret=g.qty>1?`<span class="caret" style="cursor:pointer">▸</span>`:"";
    h+=`<tr class="grow" data-gi="${gi}" style="cursor:pointer"><td>${caret}</td>`+cols.map(c=>`<td>${c.g(g)}</td>`).join("")+`</tr>`;
    g.items.forEach((it,ii)=>{
      h+=`<tr class="girow" data-gi="${gi}" data-ii="${ii}" hidden style="background:#fafbff;cursor:pointer"><td></td>`+cols.map(c=>`<td${c.key==="card"?' style="padding-left:22px"':''}>${c.i?c.i(it):""}</td>`).join("")+`</tr>`;
    });
  });
  h+='</tbody></table></div>';
  body.innerHTML=h;

  const table=body.querySelector("table.ptbl");
  makeResizable(table,(k,w)=>{ PL.widths[k]=w; savePL(PL); });
  body.querySelectorAll("input.itemin").forEach(inp=>inp.addEventListener("change",()=>saveItemId(inp.dataset.txn, inp.value)));

  // drag-to-reorder columns
  let dragKey=null;
  table.querySelectorAll("thead th[data-key]").forEach(th=>{
    th.addEventListener("dragstart",e=>{ dragKey=th.dataset.key; e.dataTransfer.effectAllowed="move"; });
    th.addEventListener("dragover",e=>{ e.preventDefault(); th.style.boxShadow="inset 3px 0 0 #5566ff"; });
    th.addEventListener("dragleave",()=>{ th.style.boxShadow=""; });
    th.addEventListener("drop",e=>{ e.preventDefault(); th.style.boxShadow=""; const tgt=th.dataset.key;
      if(!dragKey||dragKey===tgt) return;
      const o=PL.order.slice(); o.splice(o.indexOf(dragKey),1); o.splice(o.indexOf(tgt),0,dragKey);
      PL.order=o; savePL(PL); renderPurchases(PURCH_ROWS); });
  });

  // columns show/hide menu
  const btn=body.querySelector("#pcolBtn"), mnu=body.querySelector("#pcolMenu");
  if(btn) btn.onclick=()=>{ mnu.style.display=mnu.style.display==="none"?"block":"none"; };
  body.querySelectorAll("#pcolMenu input[data-col]").forEach(cb=>cb.onchange=()=>{ PL.hidden[cb.dataset.col]=!cb.checked; savePL(PL); renderPurchases(PURCH_ROWS); body.querySelector("#pcolMenu").style.display="block"; });
  const rst=body.querySelector("#pcolReset");
  if(rst) rst.onclick=()=>{ PL={order:PCOLDEF.map(c=>c.key),hidden:{},widths:{}}; savePL(PL); renderPurchases(PURCH_ROWS); };

  const tb=body.querySelector("tbody");
  if(tb) tb.addEventListener("click",e=>{
    if(e.target.closest("a")||e.target.closest("input")) return;   // let links & item-# inputs through
    const gr=e.target.closest("tr.grow");
    if(gr){ const g=PURCH[+gr.dataset.gi];
      if(g.qty<=1){ openPurchasedCard(g.rep); return; }
      const kids=body.querySelectorAll(`tr.girow[data-gi="${gr.dataset.gi}"]`);
      const show=kids.length&&kids[0].hidden; kids.forEach(x=>x.hidden=!show);
      const c=gr.querySelector(".caret"); if(c) c.textContent=show?"▾":"▸";
      return;
    }
    const ir=e.target.closest("tr.girow");
    if(ir){ openPurchasedCard(PURCH[+ir.dataset.gi].items[+ir.dataset.ii]); }
  });
}

async function openPurchasedCard(p){
  if(!p) return;
  const key=[p.game,p.set_name,p.card_number,p.parallel].join("¦");
  let r=RAW.find(x=>keyOf(x)===key);
  if(!r){
    try{
      const enc=encodeURIComponent;
      const cols="game,set_name,card_number,name,parallel,lang,pc_console,pc_product,price_confidence,gems,total,gem_rate,raw,psa9,psa10,volume,psa10_chg";
      const q=`price_changes?game=eq.${enc(p.game)}&set_name=eq.${enc(p.set_name)}&card_number=eq.${enc(p.card_number||"")}&parallel=eq.${enc(p.parallel||"")}&select=${cols}&order=snapshot_date.desc&limit=1`;
      const d=await rest(q); if(d&&d[0]) r=enrich(d[0]);
    }catch(e){}
    if(!r) r=enrich({game:p.game,set_name:p.set_name,card_number:p.card_number,parallel:p.parallel,name:p.name,gem_rate:p.gem_rate,psa9:p.psa9,psa10:p.psa10});
  }
  closePurchases(); openCard(r);
}

function buildAddForm(){

    </div>

function findCard(term){
  term=(term||"").trim().toLowerCase(); if(!term) return null;
  let c=RAW.find(x=>((x.name+" "+(x.parallel||"")+" #"+x.card_number).toLowerCase())===term);
  if(c) return c;
  const toks=term.split(/[\s|]+/).filter(Boolean);
  const cands=RAW.filter(x=>{const s=(x.name+" "+(x.parallel||"")+" "+x.card_number).toLowerCase(); return toks.every(t=>s.includes(t));});
  return cands.length?cands[0]:null;
}
async function addPurchase(card, price, date, qty, itemId){
  const title=`${card.name} ${card.parallel||""} #${card.card_number} (manual)`.replace(/\s+/g," ").trim();
  const {error}=await sb.from("card_transactions").insert({user_id:SESSION.user.id,type:"buy",txn_date:date||null,
    price:(price!=null&&price!=="")?+price:null,item_title:title,ebay_order_id:null,email_id:null,
    ebay_item_id:(itemId||"").replace(/[^0-9]/g,"")||null,
    game:card.game,set_name:card.set_name,card_number:card.card_number,parallel:card.parallel,matched:true,confidence:"manual"});
  if(error) throw new Error(error.message);
  const k=keyOf(card); const t=TRACK[k]||{qty:0,stage:""}; t.qty=(t.qty||0)+(+qty||1); t.stage="purchased"; TRACK[k]=t; saveTrack();
  await syncCard(card);
}
async function addSingle(){
  const st=document.getElementById("astatus");
  const card=findCard(document.getElementById("acard").value);
  if(!card){ st.innerHTML='<span class="err">No matching card in the current season — switch season or refine.</span>'; return; }
  try{
    await addPurchase(card, document.getElementById("aprice").value, document.getElementById("adate").value, document.getElementById("aqty").value, (document.getElementById("aitem")||{}).value);
    document.getElementById("acard").value=""; document.getElementById("aprice").value="";
    st.innerHTML='<span class="pos">Added '+card.name+'.</span>';
    openPurchases();
  }catch(e){ st.innerHTML='<span class="err">'+e.message+'</span>'; }
}
async function addBulk(){
  const st=document.getElementById("astatus");
  const lines=document.getElementById("abulktext").value.split("\n").map(l=>l.trim()).filter(Boolean);
  let ok=0; const bad=[];
  for(const line of lines){
    const p=line.split("|").map(s=>s.trim());
    const card=findCard(p[0]);
    if(!card){ bad.push(p[0]); continue; }
    try{ await addPurchase(card, p[1], p[2], 1); ok++; }catch(e){ bad.push(p[0]); }
  }
  st.innerHTML=`<span class="pos">Added ${ok}.</span>`+(bad.length?` <span class="err">No match: ${bad.join("; ")}</span>`:"");
  if(ok) openPurchases();
}

function lbEstProfit(it){
  const gr=num(it.gem_rate), p9=num(it.psa9), p10=num(it.psa10), price=num(it.price);
  if(gr==null||p9==null||p10==null||price==null) return null;
  return (gr*p10+(1-gr)*p9)*0.88 - costFor(price) - price;
}
async function openLetsBuy(){
  const body=document.getElementById("bbody");
  if(!sb||!SESSION){ body.innerHTML='<p class="note">Sign in (top-right) to see buy candidates for your ⭐ favorites.</p>'; return; }
  body.innerHTML='<p class="note">Loading active listings for your favorites…</p>';
  try{
    const {data,error}=await sb.rpc("lets_buy_listings");
    if(error){ body.innerHTML='<p class="err">'+error.message+'</p>'; return; }
    LB=data||[];
    // auto-dismiss listings from zero-review sellers (treated as "not interested")
    const zero=LB.filter(it=>it.seller_feedback_score!=null && Number(it.seller_feedback_score)===0);
    if(zero.length){
      try{ await sb.from("listing_dismissals").insert(zero.map(it=>({user_id:SESSION.user.id,item_id:it.item_id}))); }catch(e){}
      const ids=new Set(zero.map(it=>it.item_id)); LB=LB.filter(it=>!ids.has(it.item_id));
    }
    renderLetsBuy();
  }catch(e){ body.innerHTML='<p class="err">'+e.message+'</p>'; }
}
function timeAgo(iso){ if(!iso) return "—"; const t=new Date(iso).getTime(); if(isNaN(t)) return "—";
  const s=Math.max(0,(Date.now()-t)/1000);
  if(s<90) return "just now";
  if(s<3600) return Math.round(s/60)+"m ago";
  if(s<86400) return Math.round(s/3600)+"h ago";
  return Math.round(s/86400)+"d ago"; }
function absTime(iso){ if(!iso) return ""; const d=new Date(iso); return isNaN(d.getTime())?"":d.toLocaleString(); }
// listing type + deal helpers
const binOf=it=>{const b=(it.buying_options||"");return b.includes("FIXED_PRICE")?"B":(b.includes("AUCTION")?"A":"");};
function isBinDeal(it,g){
  if(!(it.buying_options||"").includes("FIXED_PRICE")) return false;   // deal flag is Buy-It-Now only
  const t=new Date(it.first_seen).getTime();
  if(isNaN(t) || (Date.now()-t) > FIRECFG.hours*3600*1000) return false;   // freshness window (adjustable)
  const p=num(it.price); if(p==null||p<=0) return false;
  const thr=1-(FIRECFG.pct/100);
  const paid=num(g.paidAvg), raw=num(g.raw);
  return (FIRECFG.vsPaid && paid!=null && p<=paid*thr) || (FIRECFG.vsRaw && raw!=null && p<=raw*thr);
}

  const body=document.getElementById("bbody");
  pcolStyle();
  const now=Date.now(), H=3600*1000;
  const gm={};
  LB.forEach(it=>{ const k=[it.game,it.set_name,it.card_number,it.parallel].join("¦");
    (gm[k]||(gm[k]={rep:it,items:[]})).items.push(it); });
  let groups=Object.values(gm);
  groups.forEach(g=>{
    g.c1=g.c6=g.c12=g.c24=0;
    g.items.forEach(it=>{ const age=now-new Date(it.first_seen).getTime();
      if(age<=H)g.c1++; if(age<=6*H)g.c6++; if(age<=12*H)g.c12++; if(age<=24*H)g.c24++; });
    g.total=g.items.length;
    g.minPrice=Math.min.apply(null,g.items.map(it=>num(it.price)));
    g.paidAvg=num(g.rep.paid_avg); g.raw=num(g.rep.raw);
    g.items.sort((a,b)=>new Date(b.first_seen).getTime()-new Date(a.first_seen).getTime());   // newest first, so the arrivals driving the ≤1h/≤6h counts sit at the top
    g.hasDeal=g.items.some(it=>isBinDeal(it,g));
    let bp=Math.max.apply(null,g.items.map(it=>{const p=lbEstProfit(it);return p==null?-1e9:p;}));
    g.bestProfit=bp<=-1e9?null:bp;
  });
  if(LBL.sort && LBSORT[LBL.sort.key]){ const acc=LBSORT[LBL.sort.key], dir=LBL.sort.dir;
    groups.sort((a,b)=>{ let av=acc(a),bv=acc(b); av=(av==null)?-Infinity:av; bv=(bv==null)?-Infinity:bv; if(av<bv)return -dir; if(av>bv)return dir; return 0; }); }
  else groups.sort((a,b)=> (b.hasDeal?1:0)-(a.hasDeal?1:0) || b.c1-a.c1 || b.c6-a.c6 || b.total-a.total);
  LBGROUPS=groups;
  if(!groups.length){ body.innerHTML='<p class="note">No active raw listings right now. The background refresh runs every 30 min — check back soon, or add more favorites (☆ on any card).</p>'; return; }
  const cols=LBL.order.map(k=>LBCOLS.find(c=>c[0]===k)).filter(c=>c && !LBL.hidden[c[0]]);
  const menu=LBL.order.map(k=>{const c=LBCOLS.find(x=>x[0]===k);return `<label class="pcitem"><input type="checkbox" data-col="${k}" ${LBL.hidden[k]?"":"checked"}> ${c[1]}</label>`;}).join("");
  let h=`<div class="ptools"><div class="note" style="margin:0;max-width:600px">Raw listings for your ⭐ favorites (Buy It Now + auctions), refreshed every 30 min. <b>🔥</b> = a Buy It Now ≥${FIRECFG.pct}% below your avg paid/market raw, listed &lt;${FIRECFG.hours}h ago (adjust with 🔥 Rules). <b>B</b>=Buy It Now, <b>A</b>=Auction.</div>`;
  h+=`<div style="display:flex;gap:8px;align-items:flex-start">`
    +`<button class="pbtn" id="lbRefresh" title="Re-check eBay now for sold/ignored items">🔄 Refresh</button>`
    +`<div class="pcolwrap"><button class="pbtn" id="fireBtn">🔥 Rules</button><div class="pcmenu" id="fireMenu" style="display:none;min-width:236px"><div class="pchint">🔥 flags a Buy It Now priced at least X% below your avg paid or the market raw, listed within the last N hours.</div><label class="pcitem" style="justify-content:space-between">Discount % below <input id="fPct" type="number" min="1" max="99" value="${FIRECFG.pct}" style="width:60px"></label><label class="pcitem" style="justify-content:space-between">Listed within (hrs) <input id="fHrs" type="number" min="1" max="336" value="${FIRECFG.hours}" style="width:60px"></label><label class="pcitem"><input type="checkbox" id="fPaid" ${FIRECFG.vsPaid?"checked":""}> vs your avg paid</label><label class="pcitem"><input type="checkbox" id="fRaw" ${FIRECFG.vsRaw?"checked":""}> vs market raw</label><button class="pbtn" id="fireSave" style="margin-top:8px;width:100%">💾 Save &amp; refresh</button></div></div>`
    +`<div class="pcolwrap"><button class="pbtn" id="lbcolBtn">⚙ Columns ▾</button><div class="pcmenu" id="lbcolMenu" style="display:none"><div class="pchint">Show / hide · drag headers to reorder</div>${menu}<button class="pbtn" id="lbcolReset" style="margin-top:6px;width:100%">Reset layout</button></div></div>`
    +`</div></div>`;
  h+='<div class="tablewrap"><table class="ptbl"><thead><tr><th class="pcx"></th>'+cols.map(c=>{
    const active=LBL.sort&&LBL.sort.key===c[0];
    const car=active?(LBL.sort.dir>0?'▲':'▼'):(LBSORT[c[0]]?'⇅':'');
    const st=(LBL.widths[c[0]]?`width:${LBL.widths[c[0]]}px;`:'')+(LBSORT[c[0]]?'cursor:pointer':'');
    return `<th draggable="true" data-key="${c[0]}"${st?` style="${st}"`:''}>${c[1]}${car?` <span style="opacity:.45;font-size:10px">${car}</span>`:''}</th>`;
  }).join("")+'</tr></thead><tbody>';
  groups.forEach((g,gi)=>{
    h+=`<tr class="lgrow" data-gi="${gi}" style="cursor:pointer"><td><span class="caret">▸</span></td>`+cols.map(c=>`<td>${c[2](g,gi)}</td>`).join("")+`</tr>`;
    g.items.forEach((it,ii)=>{
      h+=`<tr class="lirow" data-gi="${gi}" data-ii="${ii}" hidden style="background:#fafbff;cursor:pointer"><td></td>`+cols.map(c=>`<td>${c[3](it,g)}</td>`).join("")+`</tr>`;
    });
  });
  h+='</tbody></table></div>';
  body.innerHTML=h;
  const table=body.querySelector("table.ptbl");
  makeResizable(table,(k,w)=>{ LBL.widths[k]=w; saveLBL(LBL); });
  let dragKey=null, dragged=false;
  table.querySelectorAll("thead th[data-key]").forEach(th=>{
    th.addEventListener("dragstart",e=>{ dragKey=th.dataset.key; dragged=true; e.dataTransfer.effectAllowed="move"; });
    th.addEventListener("dragover",e=>{ e.preventDefault(); th.style.boxShadow="inset 3px 0 0 #5566ff"; });
    th.addEventListener("dragleave",()=>{ th.style.boxShadow=""; });
    th.addEventListener("drop",e=>{ e.preventDefault(); th.style.boxShadow=""; const tgt=th.dataset.key; if(!dragKey||dragKey===tgt) return;
      const o=LBL.order.slice(); o.splice(o.indexOf(dragKey),1); o.splice(o.indexOf(tgt),0,dragKey); LBL.order=o; saveLBL(LBL); renderLetsBuy(); });
    th.addEventListener("click",e=>{ if(dragged){ dragged=false; return; } if(e.target.closest(".colresize")) return;
      const k=th.dataset.key; if(!LBSORT[k]) return;
      if(LBL.sort && LBL.sort.key===k) LBL.sort={key:k,dir:LBL.sort.dir*-1};
      else LBL.sort={key:k,dir:(k==='card'||k==='set'||k==='num')?1:-1};
      saveLBL(LBL); renderLetsBuy(); });
  });
  const rbtn=body.querySelector("#lbRefresh");
  if(rbtn) rbtn.onclick=async()=>{
    if(!sb||!SESSION){ openLetsBuy(); return; }
    rbtn.disabled=true; rbtn.textContent="⏳ Checking eBay…";
    try{ await sb.functions.invoke("refresh-favorites"); }catch(e){ /* still re-query below */ }
    await openLetsBuy();   // re-query: sold items have aged out, ignores excluded, counts updated
  };
  const cbtn=body.querySelector("#lbcolBtn"), cmnu=body.querySelector("#lbcolMenu");
  if(cbtn) cbtn.onclick=()=>{ cmnu.style.display=cmnu.style.display==="none"?"block":"none"; };
  const firebtn=body.querySelector("#fireBtn"), firemnu=body.querySelector("#fireMenu");
  if(firebtn) firebtn.onclick=()=>{ firemnu.style.display=firemnu.style.display==="none"?"block":"none"; };
  const firesave=body.querySelector("#fireSave");
  if(firesave) firesave.onclick=()=>{
    FIRECFG.pct=Math.max(1,Math.min(99,parseFloat(body.querySelector("#fPct").value)||20));
    FIRECFG.hours=Math.max(1,Math.min(336,parseFloat(body.querySelector("#fHrs").value)||6));
    FIRECFG.vsPaid=body.querySelector("#fPaid").checked;
    FIRECFG.vsRaw=body.querySelector("#fRaw").checked;
    if(!FIRECFG.vsPaid && !FIRECFG.vsRaw) FIRECFG.vsRaw=true;   // keep at least one basis
    saveFire();
    openLetsBuy();   // re-fetch latest listings + recompute fire flags
  };
  body.querySelectorAll("#lbcolMenu input[data-col]").forEach(cb=>cb.onchange=()=>{ LBL.hidden[cb.dataset.col]=!cb.checked; saveLBL(LBL); renderLetsBuy(); body.querySelector("#lbcolMenu").style.display="block"; });
  const rst=body.querySelector("#lbcolReset");
  if(rst) rst.onclick=()=>{ LBL={order:LBCOLS.map(c=>c[0]),hidden:{},widths:{},sort:null}; saveLBL(LBL); renderLetsBuy(); };
  const tb=body.querySelector("tbody");
  tb.addEventListener("click",e=>{
    if(e.target.closest("a")) return;
    const gb=e.target.closest(".gbtn"); if(gb){ e.stopPropagation(); openGallery(LBGROUPS[+gb.dataset.gal]); return; }
    const gr=e.target.closest("tr.lgrow");
    if(gr){ const kids=body.querySelectorAll(`tr.lirow[data-gi="${gr.dataset.gi}"]`);
      const show=kids.length&&kids[0].hidden; kids.forEach(x=>x.hidden=!show);
      const c=gr.querySelector(".caret"); if(c) c.textContent=show?"▾":"▸"; return; }
    const ir=e.target.closest("tr.lirow");
    if(ir){ openListing(LBGROUPS[+ir.dataset.gi].items[+ir.dataset.ii]); }
  });
}
function openListing(it){
  if(!it) return;
  document.getElementById("lTitle").textContent=it.name||it.title||"Listing";
  const prof=lbEstProfit(it), pct=it.seller_feedback_pct, sc=it.seller_feedback_score;
  const isBin=(it.buying_options||"").includes("FIXED_PRICE");
  const fresh6=!isNaN(new Date(it.first_seen).getTime()) && (Date.now()-new Date(it.first_seen).getTime())<=FIRECFG.hours*3600*1000;
  const fthr=1-(FIRECFG.pct/100);
  const deal=isBin && fresh6 && ((FIRECFG.vsPaid && num(it.paid_avg)!=null && num(it.price)<=num(it.paid_avg)*fthr) || (FIRECFG.vsRaw && num(it.raw)!=null && num(it.price)<=num(it.raw)*fthr));
  document.getElementById("lBody").innerHTML=`
    <div class="cardimg">${it.image_url?`<img src="${escH(it.image_url)}" alt="">`:""}</div>
    <div style="font-size:18px;font-weight:700;margin:2px 0 6px">${deal?"🔥 ":""}${money2(it.price)} <span class="muted" style="font-size:12px;font-weight:400">${isBin?"Buy It Now":((it.buying_options||"").includes("AUCTION")?"Auction":"")}</span></div>
    <div class="note" style="margin:0 0 10px">${escH(it.title||"")}</div>
    <div class="kv">
      <div class="k">Card</div><div class="v">${escH(it.name||"")} ${escH(it.parallel||"")}</div>
      <div class="k">Set</div><div class="v">${escH((it.set_name||"").replace(" (EN)",""))}</div>
      <div class="k">Card #</div><div class="v">${escH(it.card_number||"—")}</div>
      <div class="k">Condition</div><div class="v">${escH(it.condition||"—")}</div>
      <div class="k">Type</div><div class="v">${isBin?"Buy It Now (B)":((it.buying_options||"").includes("AUCTION")?"Auction (A)":"—")}</div>
      <div class="k">Seller</div><div class="v">${escH(it.seller_username||"—")}</div>
      <div class="k">Seller reviews</div><div class="v">${sc==null?"—":(+sc).toLocaleString()}${pct==null?"":" · "+pct+"% pos"}</div>
      <div class="k">Listed</div><div class="v">${timeAgo(it.first_seen)}${it.first_seen?` <span class="muted">(${escH(absTime(it.first_seen))})</span>`:""}</div>
      <div class="k">Gem rate</div><div class="v">${it.gem_rate==null?"—":Math.round(num(it.gem_rate)*100)+"%"}</div>
      <div class="k">PSA 10 ref</div><div class="v">${money2(it.psa10)}</div>
      <div class="k">Raw ref</div><div class="v">${money2(it.raw)}</div>
      <div class="k">PSA 9 ref</div><div class="v">${money2(it.psa9)}</div>
      <div class="k">Avg you paid</div><div class="v">${it.paid_avg==null?"—":money2(it.paid_avg)}</div>
      <div class="k">Est. profit @ this price</div><div class="v">${prof==null?"—":`<span class="${prof>=0?'pos':'neg'}">${money2(prof)}</span>`}</div>
    </div>
    <a class="ebtn primary" href="${escH(it.url||"#")}" target="_blank" rel="noopener">🔎 View / Buy on eBay ↗</a>
    <button class="notint" id="notIntBtn">🚫 Not interested — hide this listing</button>
    <div class="note">Est. profit uses the tiered PSA fee ($20 grade if this price &lt; $50, else $79) + $3 handling.</div>`;
  document.getElementById("notIntBtn").onclick=()=>dismissListing(it);
  document.getElementById("lov").classList.add("on");
  document.getElementById("lside").classList.add("on");
}
async function dismissListing(it){
  if(sb&&SESSION){ try{ await sb.from("listing_dismissals").insert({user_id:SESSION.user.id,item_id:it.item_id}); }catch(e){} }
  LB=LB.filter(x=>x.item_id!==it.item_id);
  closeListing(); renderLetsBuy();
}
function closeGallery(){ document.getElementById("gov").classList.remove("on"); document.getElementById("gmodal").classList.remove("on"); }
function openGallery(g){
  if(!g) return;
  const now=Date.now(), DAY=86400*1000;
  const items=g.items.filter(it=>now-new Date(it.first_seen).getTime()<=DAY)
    .sort((a,b)=>new Date(b.first_seen).getTime()-new Date(a.first_seen).getTime());
  document.getElementById("gTitle").innerHTML=`🖼 ${escH(g.rep.name||g.rep.title)} <span class="muted">${escH(g.rep.parallel||"")}</span> — ${items.length} new in last 24h`;
  const body=document.getElementById("gbody");
  if(!items.length){ body.innerHTML='<p class="note">No new listings for this card in the last 24 hours.</p>'; }
  else {
    body.innerHTML='<div class="note" style="margin-top:0">Newest first. Tap the image (or Buy) to open on eBay; Ignore hides a listing everywhere.</div><div class="ggrid">'+items.map(it=>{
      const deal=isBinDeal(it,g), ty=binOf(it);
      return `<div class="gcard" data-item="${escH(it.item_id)}"><div class="gimg"><a href="${escH(it.url||"#")}" target="_blank" rel="noopener">${it.image_url?`<img src="${escH(it.image_url)}" alt="" loading="lazy">`:""}</a></div>`+
        `<div class="gmeta"><div class="gprice">${deal?"🔥 ":""}${money2(it.price)} <span class="muted" style="font-size:11px;font-weight:400">${ty==="B"?"BIN":ty==="A"?"Auction":""}</span></div>`+
        `<div class="gtime" title="${escH(absTime(it.first_seen))}">🕒 ${timeAgo(it.first_seen)}</div></div>`+
        `<div class="gbtns"><button class="gignore" data-item="${escH(it.item_id)}">🚫 Ignore</button><a class="gbuy" href="${escH(it.url||"#")}" target="_blank" rel="noopener" style="display:flex;align-items:center;justify-content:center;text-decoration:none">🛒 Buy</a></div></div>`;
    }).join("")+'</div>';
    body.querySelectorAll(".gignore").forEach(btn=>btn.onclick=async(ev)=>{
      ev.stopPropagation(); const id=btn.dataset.item;
      const it=g.items.find(x=>String(x.item_id)===String(id));
      if(sb&&SESSION&&it){ try{ await sb.from("listing_dismissals").insert({user_id:SESSION.user.id,item_id:it.item_id}); }catch(e){} }
      LB=LB.filter(x=>String(x.item_id)!==String(id));
      g.items=g.items.filter(x=>String(x.item_id)!==String(id));
      const card=body.querySelector(`.gcard[data-item="${CSS.escape(id)}"]`);
      if(card){ card.classList.add("gone"); card.querySelectorAll("button,a").forEach(el=>el.style.pointerEvents="none"); }
      renderLetsBuy();
    });
  }
  document.getElementById("gov").classList.add("on");
  document.getElementById("gmodal").classList.add("on");
}

async function boot(){
  try{
    syncControls(); bind(); buildSeasonChips(); renderAuth(); initAuth();
    (function(){ const hdr=document.getElementById("filterHdr"), bd=document.getElementById("filterBody"), car=document.getElementById("filterCaret");
      if(!hdr) return; let open=localStorage.getItem("voltdash.filtersOpen")!=="0";
      const apply=()=>{ bd.style.display=open?"":"none"; car.textContent=open?"▾ Hide":"▸ Show"; };
      apply(); hdr.onclick=()=>{ open=!open; localStorage.setItem("voltdash.filtersOpen", open?"1":"0"); apply(); }; })();
    document.getElementById("sClose").onclick=closeSide;
    document.getElementById("ov").onclick=closeSide;
    document.getElementById("addPurchaseBtn").onclick=openAddForm;
    document.getElementById("favBtnTop").onclick=openFavorites;
    document.getElementById("fClose").onclick=closeFav;
    document.getElementById("fov").onclick=closeFav;
    document.getElementById("lClose").onclick=closeListing;
    document.getElementById("lov").onclick=closeListing;
    document.getElementById("gClose").onclick=closeGallery;
    document.getElementById("gov").onclick=closeGallery;
    document.querySelectorAll("#topnav .navbtn").forEach(b=>b.onclick=()=>showView(b.dataset.view));
    document.getElementById("subLetsBuy").onclick=()=>showBuySub("letsbuy");
    document.getElementById("subPurchased").onclick=()=>showBuySub("purchased");
    showView(localStorage.getItem("voltdash.view")==="buy"?"buy":"discover");
    document.querySelector("#tbl tbody").addEventListener("click",e=>{
      const tr=e.target.closest("tr[data-i]"); if(!tr) return;
      const r=VIEW[+tr.dataset.i]; if(!r) return;
      if(e.target.closest(".valmark")){ toggleValue(r); render(); return; }
      if(e.target.closest(".star")){ toggleFav(r); render(); return; }
      openCard(r);
    });
    await loadSeason();
  }catch(err){
    document.getElementById("sub").innerHTML=`<span class="err">Couldn't load data: ${err.message}. Use the Reload button after the connector is ready.</span>`;
  }
}
boot();
</script>
</body>
