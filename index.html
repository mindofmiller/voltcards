<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Volt Cards — Grading ROI Dashboard</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%2024%2024'%3E%3Crect%20width='24'%20height='24'%20rx='5'%20fill='%230b1f4d'/%3E%3Cpath%20d='M14%202%20L5%2013%20h5%20l-1%209%209-12%20h-5%20z'%20fill='%23ffd23f'/%3E%3C/svg%3E">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.5.0/dist/chart.umd.js" integrity="sha384-iU8HYtnGQ8Cy4zl7gbNMOhsDTTKX02BTXptVP/vqAWIaTfM7isw76iyZCsjL2eVi" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.4/dist/umd/supabase.min.js"></script>
<style>
:root{
  color-scheme: light;
  --bg:#f6f7fb; --panel:#ffffff; --ink:#1a2233; --muted:#6b7488; --line:#e4e7ef;
  --accent:#3b5bdb; --good:#2f9e57; --goodbg:#e7f6ec; --warn:#c98a00; --bad:#d1435b;
  --op:#e8590c; --pk:#3b5bdb; --mg:#7048e8; --chip:#eef1f8;
}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--ink);font:13px/1.45 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif}
.wrap{padding:16px;max-width:1400px;margin:0 auto}
h1{font-size:18px;margin:0 0 2px}
.sub{color:var(--muted);font-size:12px;margin-bottom:14px}
.row{display:flex;flex-wrap:wrap;gap:10px}
.card{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:12px 14px}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin-bottom:14px}
.stat .k{color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.04em}
.stat .v{font-size:22px;font-weight:700;margin-top:2px}
.stat .s{font-size:11px;color:var(--muted)}
.controls{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px;margin-bottom:14px}
.rng{display:flex;align-items:center;gap:6px}
.rng input{min-width:0}
.rng span{color:var(--muted)}
label.fld{display:block;font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.03em;margin-bottom:5px}
select,input[type=number],input[type=text]{width:100%;padding:7px 9px;border:1px solid var(--line);border-radius:8px;background:#fff;color:var(--ink);font-size:13px}
.chips{display:flex;flex-wrap:wrap;gap:6px}
.chip{padding:5px 10px;border:1px solid var(--line);border-radius:999px;background:var(--chip);cursor:pointer;user-select:none;font-size:12px}
.chip.on{background:var(--accent);border-color:var(--accent);color:#fff}
.toggles{display:flex;flex-wrap:wrap;gap:14px;align-items:center}
.tg{display:flex;gap:6px;align-items:center;cursor:pointer;font-size:12px}
.chartbox{height:340px;position:relative}
.tablewrap{overflow:auto;max-height:560px;border:1px solid var(--line);border-radius:10px}
table{border-collapse:collapse;width:100%;font-size:12px;background:#fff}
th,td{padding:7px 9px;text-align:right;white-space:nowrap;border-bottom:1px solid var(--line)}
th:nth-child(-n+3),td:nth-child(-n+3){text-align:left}
th{position:sticky;top:0;background:#f0f2f8;cursor:pointer;user-select:none;font-size:11px;text-transform:uppercase;letter-spacing:.03em;color:var(--muted);z-index:1}
th.sort::after{content:" \2195";opacity:.4}
th.asc::after{content:" \2191";opacity:.9}
th.desc::after{content:" \2193";opacity:.9}
tr.out td{background:var(--goodbg)}
tr.out td:first-child{box-shadow:inset 3px 0 0 var(--good)}
.g-op{color:var(--op)}.g-pokemon{color:var(--pk)}.g-magic{color:var(--mg)}
.dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:6px;vertical-align:middle}
.pos{color:var(--good)}.neg{color:var(--bad)}
.pill{font-size:11px;padding:1px 7px;border-radius:999px;background:var(--chip)}
.muted{color:var(--muted)}
.err{color:var(--bad);padding:10px}
.legend{display:flex;gap:14px;font-size:12px;color:var(--muted);margin:8px 2px}
.legend span{display:flex;align-items:center}
footer{color:var(--muted);font-size:11px;margin-top:12px}
tbody tr{cursor:pointer}
tbody tr:hover td{background:#eef3ff}
tr.out:hover td{background:#dff0e4}
.seasons{display:flex;gap:6px;margin-bottom:12px}
.seasons .chip{font-weight:600}
/* sidebar */
#ov{position:fixed;inset:0;background:rgba(20,26,40,.28);opacity:0;pointer-events:none;transition:.15s;z-index:40}
#ov.on{opacity:1;pointer-events:auto}
#side{position:fixed;top:0;right:0;height:100%;width:min(420px,92vw);background:var(--panel);border-left:1px solid var(--line);
  box-shadow:-8px 0 24px rgba(20,26,40,.12);transform:translateX(100%);transition:.18s;z-index:50;display:flex;flex-direction:column}
#side.on{transform:none}
#side header{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;padding:14px 16px;border-bottom:1px solid var(--line)}
#side header h2{font-size:15px;margin:0}
#side .close{border:none;background:var(--chip);border-radius:8px;width:28px;height:28px;cursor:pointer;font-size:16px;line-height:1}
#side .body{padding:14px 16px;overflow:auto}
.kv{display:grid;grid-template-columns:auto 1fr;gap:4px 12px;font-size:12px;margin-bottom:14px}
.kv .k{color:var(--muted)}
.kv .v{text-align:right;font-variant-numeric:tabular-nums}
.ebtn{display:flex;align-items:center;gap:8px;width:100%;text-decoration:none;color:var(--ink);border:1px solid var(--line);
  border-radius:9px;padding:9px 11px;margin-bottom:8px;background:#fff;font-size:13px;cursor:pointer}
.ebtn:hover{background:#f4f6fc;border-color:#c9d2ea}
.ebtn.primary{background:var(--accent);color:#fff;border-color:var(--accent);justify-content:center;font-weight:600}
.ebtn small{color:var(--muted)}
.ebtn.primary small{color:#dfe6ff}
.note{font-size:11px;color:var(--muted);margin:10px 0 4px;line-height:1.5}
/* tracking + favorites */
.star{cursor:pointer;color:#c9a100;font-size:15px;padding:0 2px;line-height:1}
.star:not(.on){color:#c2c8d6}
.statuscell{display:flex;gap:6px;justify-content:flex-end;align-items:center}
.stg{font-size:10px;padding:1px 6px;border-radius:999px;background:var(--chip);color:var(--muted);white-space:nowrap}
.stg.s-purchased{background:#e7edff;color:#3b5bdb}
.stg.s-psa{background:#fff2d9;color:#b7791f}
.stg.s-listed{background:#efe6ff;color:#6b46c1}
.stg.s-sold{background:#e7f6ec;color:#2f9e57}
.track{border-top:1px solid var(--line);margin-top:12px;padding-top:12px}
.track h3{font-size:12px;text-transform:uppercase;letter-spacing:.04em;color:var(--muted);margin:0 0 10px}
.trow{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;font-size:13px}
.favbtn{width:100%;border:1px solid var(--line);background:#fff;border-radius:9px;padding:9px;cursor:pointer;font-size:13px;font-weight:600;margin-bottom:12px}
.favbtn.on{background:#fff7e0;border-color:#e6c34d;color:#8a6d00}
.favbtn.valon{background:#eef7ff;border-color:#7fb3e6;color:#1c5a99}
.valmark{cursor:pointer;margin-right:4px}
.stepper{display:flex;align-items:center;gap:6px}
.stepper button{width:28px;height:28px;border:1px solid var(--line);background:#fff;border-radius:7px;cursor:pointer;font-size:15px}
.stepper input{width:54px;text-align:center}
.stages{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:4px}
.stage{border:1px solid var(--line);background:#fff;border-radius:8px;padding:8px;cursor:pointer;font-size:12px;text-align:left}
.stage.done{background:#eef3ff;border-color:#c9d6f7}
.stage.cur{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:600}
.clr{background:none;border:none;color:var(--muted);font-size:11px;cursor:pointer;margin-top:8px;text-decoration:underline}
.authbar{display:flex;justify-content:flex-end;align-items:center;gap:8px;margin:-4px 0 10px;font-size:12px;flex-wrap:wrap}
.authbar .ain{width:190px;padding:6px 8px;border:1px solid var(--line);border-radius:8px}
.authbar .abtn{padding:6px 10px;border:1px solid var(--accent);background:var(--accent);color:#fff;border-radius:8px;cursor:pointer;font-size:12px}
.pbtn{margin-left:auto;padding:5px 12px;border:1px solid var(--accent);background:#fff;color:var(--accent);border-radius:999px;cursor:pointer;font-size:12px;font-weight:600}
.pbtn:hover{background:var(--accent);color:#fff}
.povl{position:fixed;inset:0;background:rgba(20,26,40,.28);opacity:0;pointer-events:none;transition:.15s;z-index:60}
.povl.on{opacity:1;pointer-events:auto}
#pmodal,#fmodal{position:fixed;top:4vh;left:50%;transform:translateX(-50%) translateY(-20px);width:min(1000px,94vw);max-height:92vh;background:var(--panel);border:1px solid var(--line);border-radius:12px;box-shadow:0 20px 60px rgba(20,26,40,.25);z-index:70;display:none;flex-direction:column;opacity:0;transition:.15s}
#pmodal.on,#fmodal.on{display:flex;opacity:1;transform:translateX(-50%) translateY(0)}
#pmodal header,#fmodal header{display:flex;justify-content:space-between;align-items:center;padding:14px 16px;border-bottom:1px solid var(--line)}
#pmodal header h2,#fmodal header h2{margin:0;font-size:15px}
#pmodal .close,#fmodal .close{border:none;background:var(--chip);border-radius:8px;width:28px;height:28px;cursor:pointer;font-size:16px}
.pbody{padding:14px 16px;overflow:auto}
.psum{display:flex;gap:18px;flex-wrap:wrap;font-size:13px;margin-bottom:12px;font-weight:600}
.ptbl th{position:sticky;top:0}
.phdr{display:flex;gap:8px;align-items:center}
#pmodal tbody tr,#fmodal tbody tr{cursor:pointer}
#pmodal tbody tr:hover td,#fmodal tbody tr:hover td{background:#eef3ff}
.addform{padding:12px 16px;border-bottom:1px solid var(--line);background:#fafbff}
.addform .ain2{padding:7px 9px;border:1px solid var(--line);border-radius:8px;font-size:13px}
.addform #acard,.addform #abulktext{width:100%;margin-bottom:4px}
.addform .arow{display:flex;gap:8px;margin-top:8px;flex-wrap:wrap;align-items:center}
.amode{display:flex;gap:6px;margin-bottom:10px}
.amode button{padding:5px 12px;border:1px solid var(--line);background:#fff;border-radius:999px;cursor:pointer;font-size:12px}
.amode button.on{background:var(--accent);color:#fff;border-color:var(--accent)}
.prov{font-size:11px;color:var(--muted);line-height:1.5;margin:0 0 12px;padding:8px 10px;background:#f7f9fd;border:1px solid var(--line);border-radius:8px}
.langbadge{display:inline-block;font-weight:700;font-size:10px;padding:1px 6px;border-radius:5px;background:#e7edff;color:#3b5bdb;margin-right:4px}
.langbadge.jp{background:#ffe9e9;color:#c0392b}
.lowc{color:#c98a00;font-weight:600}
.okc{color:var(--good)}
.ebtn.inacon{background:#fdeaea;border-color:#e6b3b3;color:#c0392b;justify-content:center}
.dcbox{border:1px solid var(--line);border-radius:9px;padding:10px;margin:6px 0 8px;background:#f7f9fd}
.dcbox .arow{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-top:6px}
</style>
</head>

function looksLikeRows(a){
  return Array.isArray(a) && (a.length===0 || (a[0] && typeof a[0]==="object" && ROWKEYS.some(k=>k in a[0])));
}
// Recursively locate the rows array regardless of how the connector nests/wraps it.
function findRows(x,depth){
  if(x==null||depth>6) return null;
  if(looksLikeRows(x)) return x;
  if(Array.isArray(x)){ for(const it of x){ const r=findRows(it,depth+1); if(r) return r; } return null; }
  if(typeof x==="string"){
    let o=null; try{o=JSON.parse(x);}catch(_){}
    if(o){ const r=findRows(o,depth+1); if(r) return r; }
    const s=x.indexOf("["), e=x.lastIndexOf("]");
    if(s>=0&&e>s){ try{ const r=findRows(JSON.parse(x.slice(s,e+1)),depth+1); if(r) return r; }catch(_){} }
    const m=x.match(/<untrusted-data[^>]*>([\s\S]*?)<\/untrusted-data/);
    if(m){ try{ const r=findRows(JSON.parse(m[1].trim()),depth+1); if(r) return r; }catch(_){} }
    return null;
  }
  if(typeof x==="object"){ for(const k in x){ const r=findRows(x[k],depth+1); if(r) return r; } }
  return null;
}

async function syncCard(r){

function enrich(r){
  const gr=num(r.gem_rate), raw=num(r.raw), p9=num(r.psa9), p10=num(r.psa10);
  const priced = raw!=null && p9!=null && p10!=null && p9>0;
  let profit=null, roi=null, liqOk=false;
  if(priced){
    profit=(gr*p10 + (1-gr)*p9)*0.88 - COST - raw;
    roi = profit/(raw + COST);
    liqOk = p10 <= 5*p9;
  }
  return Object.assign({}, r, {gr,raw,p9,p10,priced,profit,roi,liqOk,
    score:(profit!=null&&roi!=null)?profit*roi:-1e9, d10:num(r.psa10_chg)});
}

    if(st.liq && x.priced && !x.liqOk) return false;
    if(st.lowConfHide && x.price_confidence==="low") return false;

    if(st.valueOnly && !isValue(x)) return false;

}

function shortSet(s){return (s||"").replace(" (EN)","").replace("Pokemon ","Pkmn ").replace("One Piece ","OP ");}
function statusCell(r){
  const fav=isFav(r), t=trackOf(r), val=isValue(r);
  const star=`<span class="star${fav?' on':''}" data-fav="1" title="Favorite">${fav?'★':'☆'}</span>`;
  const vm=val?`<span class="valmark on" title="Value — click to remove">⏳</span>`:"";
  let badge="";
  if(t){ const p=[]; if(t.qty) p.push("×"+t.qty); if(t.stage) p.push(stageLabel(t.stage));
    if(p.length) badge=`<span class="stg s-${t.stage||'none'}">${p.join(" · ")}</span>`; }
  return `<div class="statuscell">${badge}${vm}${star}</div>`;
}

function render(){
  pcolStyle();
  const rows=filtered();
  const statusRank=r=>(isValue(r)?4:0)+(isFav(r)?2:0)+(trackOf(r)?1:0);
  rows.sort((a,b)=>{
    let av,bv;
    if(sortKey==="_status"){ av=statusRank(a); bv=statusRank(b); } else { av=a[sortKey]; bv=b[sortKey]; }
    av=(av==null)?-Infinity:(typeof av==="string"?av.toLowerCase():av);
    bv=(bv==null)?-Infinity:(typeof bv==="string"?bv.toLowerCase():bv);
    if(av<bv) return -sortDir; if(av>bv) return sortDir; return 0;
  });
  const cols=ML.order.map(k=>COLS.find(c=>c[0]===k)).filter(c=>c && !ML.hidden[c[0]]);
  // header (sortable + draggable-to-reorder + resizable)
  const thead=document.querySelector("#tbl thead");
  thead.innerHTML="<tr>"+cols.map(c=>{
    let cl="sort"; if(c[0]===sortKey) cl=sortDir>0?"asc":"desc";
    return `<th class="${cl}" draggable="true" data-k="${c[0]}" data-key="${c[0]}"${ML.widths[c[0]]?` style="width:${ML.widths[c[0]]}px"`:""}>${c[1]}</th>`;
  }).join("")+"</tr>";
  let dragKey=null;
  thead.querySelectorAll("th").forEach(th=>{
    th.onclick=e=>{ if(e.target.closest(".colresize")) return; const k=th.dataset.k;
      if(k===sortKey) sortDir*=-1; else {sortKey=k; sortDir=(k==="name"||k==="parallel"||k==="set_name")?1:-1;} render(); };
    th.addEventListener("dragstart",e=>{ dragKey=th.dataset.key; e.dataTransfer.effectAllowed="move"; });
    th.addEventListener("dragover",e=>{ e.preventDefault(); th.style.boxShadow="inset 3px 0 0 #5566ff"; });
    th.addEventListener("dragleave",()=>{ th.style.boxShadow=""; });
    th.addEventListener("drop",e=>{ e.preventDefault(); th.style.boxShadow=""; const tgt=th.dataset.key; if(!dragKey||dragKey===tgt) return;
      const o=ML.order.slice(); o.splice(o.indexOf(dragKey),1); o.splice(o.indexOf(tgt),0,dragKey); ML.order=o; saveML(ML); render(); });
  });
  // body
  const tb=document.querySelector("#tbl tbody");
  VIEW=rows.slice(0,600);
  tb.innerHTML=VIEW.map((r,i)=>{
    return `<tr data-i="${i}">`+cols.map(c=>{
      let v=c[2](r);
      if(c[0]==="set_name") v=`<span class="dot" style="background:${gameColor(r.game)}"></span>${v}`;
      if(c[0]==="roi"&&r.roi!=null){const h=Math.min(120,Math.max(0,r.roi*80));v=`<span style="color:hsl(${h},70%,35%);font-weight:600">${v}</span>`;}
      return `<td>${v}</td>`;
    }).join("")+"</tr>";
  }).join("");
  makeResizable(document.getElementById("tbl"),(k,w)=>{ ML.widths[k]=w; saveML(ML); });
  // columns show/hide menu
  const mnu=document.getElementById("mcolMenu");
  if(mnu){
    mnu.innerHTML='<div class="pchint">Show / hide · drag headers to reorder</div>'+ML.order.map(k=>{const c=COLS.find(x=>x[0]===k); return `<label class="pcitem"><input type="checkbox" data-col="${k}" ${ML.hidden[k]?"":"checked"}> ${c[1]}</label>`;}).join("")+'<button class="pbtn" id="mcolReset" style="margin-top:6px;width:100%">Reset layout</button>';
    mnu.querySelectorAll("input[data-col]").forEach(cb=>cb.onchange=()=>{ ML.hidden[cb.dataset.col]=!cb.checked; saveML(ML); render(); document.getElementById("mcolMenu").style.display="block"; });
    const rst=document.getElementById("mcolReset"); if(rst) rst.onclick=()=>{ ML={order:COLS.map(c=>c[0]),hidden:{},widths:{}}; saveML(ML); render(); };
  }
  document.getElementById("foot").textContent=`Showing ${Math.min(rows.length,600)} of ${rows.length} rows · snapshot ${st.date} · source PriceCharting · expected profit = (gem%×PSA10 + (1−gem%)×PSA9)×0.88 − $${COST} (grade+handling) − Raw · ROI = profit ÷ (Raw + $${COST})`;
  drawChart(rows);
}
function stat(k,v,s){return `<div class="card stat"><div class="k">${k}</div><div class="v">${v}</div><div class="s">${s||""}</div></div>`;}

const threshPlugin={id:"thresh",afterDraw(c){
  const {ctx,chartArea:a,scales:{x}}=c; if(!a)return;
  if(st.profMin>0){ ctx.save();ctx.setLineDash([2,3]);ctx.strokeStyle="rgba(209,67,91,.55)";ctx.lineWidth=1;
    const px=x.getPixelForValue(st.profMin); if(px>=a.left&&px<=a.right){ctx.beginPath();ctx.moveTo(px,a.top);ctx.lineTo(px,a.bottom);ctx.stroke();} ctx.restore(); }
}};

function drawChart(rows){
  const pts=rows.filter(r=>r.priced);
  const mk=r=>({x:r.profit,y:r.roi*100,r:dotR(r),_r:r});
  const byg={};
  pts.forEach(r=>{(byg[r.game]=byg[r.game]||[]).push(mk(r));});
  const ds=Object.keys(byg).map(g=>({label:g,data:byg[g],
    backgroundColor:hexA(gameColor(g),.5),
    borderColor:gameColor(g),pointRadius:byg[g].map(p=>p.r),pointHoverRadius:8}));
  const cfg={type:"scatter",data:{datasets:ds},plugins:[threshPlugin],options:{
    responsive:true,maintainAspectRatio:false,
    onClick:(evt,els)=>{ if(els&&els.length){ const el=els[0];
      const p=chart.data.datasets[el.datasetIndex].data[el.index]; if(p&&p._r) openCard(p._r); } },
    onHover:(evt,els)=>{ if(evt&&evt.native&&evt.native.target) evt.native.target.style.cursor=(els&&els.length)?"pointer":"default"; },
    scales:{x:{title:{display:true,text:"Estimated profit ($)"},grid:{color:"#eef0f6"}},
            y:{title:{display:true,text:"ROI (%)"},grid:{color:"#eef0f6"}}},
    plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>{const r=c.raw._r;
      return `${r.name} ${r.parallel} #${r.card_number} · profit ${money(r.profit)} · ROI ${Math.round(r.roi*100)}% · (click to open)`;}}}}
  }};
  if(chart)chart.destroy();
  chart=new Chart(document.getElementById("scatter"),cfg);
}
function hexA(hex,a){const h=hex.replace('#','');const n=parseInt(h.length===3?h.split('').map(c=>c+c).join(''):h,16);
  return `rgba(${(n>>16)&255},${(n>>8)&255},${n&255},${a})`;}

const numOrNull=v=>v===""||v==null?null:(isNaN(+v)?null:+v);
function buildGameChips(){
  const games=[...new Set(RAW.map(r=>r.game))];
  const el=document.getElementById("gameChips"); el.innerHTML="";
  games.forEach(g=>{
    const c=document.createElement("span");
    c.className="chip"+(st.games.includes(g)?" on":"");
    c.textContent=g==="one-piece"?"One Piece":g[0].toUpperCase()+g.slice(1);
    c.onclick=()=>{ if(st.games.includes(g)) st.games=st.games.filter(x=>x!==g); else st.games.push(g);
      save(); buildSetOptions(); c.classList.toggle("on"); render(); };
    el.appendChild(c);
  });
}
function buildSetOptions(){
  const pool=RAW.filter(r=>!st.games.length||st.games.includes(r.game));
  const sets=[...new Set(pool.map(r=>r.set_name))].sort();
  const sel=document.getElementById("setSel");
  sel.innerHTML=`<option value="__all">All sets (${sets.length})</option>`+sets.map(s=>`<option value="${s.replace(/"/g,'&quot;')}">${shortSet(s)}</option>`).join("");
  sel.value=sets.includes(st.set)?st.set:"__all"; st.set=sel.value;
}
function bind(){
  const on=(id,ev,fn)=>document.getElementById(id).addEventListener(ev,fn);
  on("profMin","input",e=>{st.profMin=+e.target.value||0;save();render();});
  on("volT","input",e=>{st.volT=+e.target.value||0;save();render();});
  on("lowConfHide","change",e=>{st.lowConfHide=e.target.checked;save();render();});
  on("hideInac","change",e=>{st.hideInac=e.target.checked;save();render();});
  on("valueOnly","change",e=>{st.valueOnly=e.target.checked;save();render();});
  on("rawMin","input",e=>{st.rawMin=numOrNull(e.target.value);save();render();});
  on("rawMax","input",e=>{st.rawMax=numOrNull(e.target.value);save();render();});
  on("p10Min","input",e=>{st.p10Min=numOrNull(e.target.value);save();render();});
  on("p10Max","input",e=>{st.p10Max=numOrNull(e.target.value);save();render();});
  on("q","input",e=>{st.q=e.target.value;save();render();});
  on("liq","change",e=>{st.liq=e.target.checked;save();render();});
  on("hideUn","change",e=>{st.hideUn=e.target.checked;save();render();});

}
function clearAll(){
  st.q=""; st.profMin=0; st.volT=0; st.rawMin=null; st.rawMax=null; st.p10Min=null; st.p10Max=null;
  st.set="__all"; st.games=[]; st.liq=true; st.lowConfHide=false; st.hideInac=false; st.valueOnly=false; st.hideUn=true;
  save(); syncControls(); buildGameChips(); buildSetOptions(); render();
}

function afterLoad(subText){
  buildGameChips(); buildSetOptions();
  document.getElementById("sub").textContent=subText;

}

const PCOLS="snapshot_date,season,game,set_name,card_number,name,parallel,lang,pc_console,pc_product,price_confidence,gems,total,gem_rate,raw,psa9,psa10,volume,source,raw_chg,psa9_chg,psa10_chg,prev_date";
async function seasonLatest(yr){ const d=await rest(`price_snapshots?season=eq.${yr}&select=snapshot_date&order=snapshot_date.desc&limit=1`); return d[0]&&d[0].snapshot_date; }
async function fetchSeason(yr,date){ return rest(`price_changes?season=eq.${yr}&snapshot_date=eq.${date}&select=${PCOLS}&order=total.desc&limit=6000`); }

async function ensureDates(yr){
  const dsel=document.getElementById("dateSel");
  const draw=await rest(`price_snapshots?season=eq.${yr}&select=snapshot_date&order=snapshot_date.desc&limit=100000`);
  const dates=[...new Set(draw.map(r=>r.snapshot_date))];
  dsel.innerHTML=dates.map(d=>`<option value="${d}">${d}</option>`).join("");
  if(!dates.includes(st.date)) st.date=dates[0]||null;
  dsel.value=st.date; save();
}
async function loadDate(){
  if(st.seasons.length!==1) return loadSeason();
  const data=await fetchSeason(st.seasons[0], st.date);
  RAW=data.map(enrich); buildGameChips(); buildSetOptions();
  document.getElementById("sub").textContent=`${RAW.length} cards · ${st.seasons[0]} · ${st.date||"—"}`;
  render();
}
async function loadSeason(){
  const dwrap=document.getElementById("dateSel").parentElement;
  const single=st.seasons.length===1;
  dwrap.style.display=single?"":"none";
  let all=[];
  if(single){
    const yr=st.seasons[0];
    await ensureDates(yr);
    if(st.date) all=await fetchSeason(yr, st.date);
  } else {
    for(const yr of st.seasons){ const dt=await seasonLatest(yr); if(dt) all=all.concat(await fetchSeason(yr, dt)); }
  }
  RAW=all.map(enrich); buildGameChips(); buildSetOptions();
  document.getElementById("sub").textContent=`${RAW.length} cards · ${st.seasons.join(" + ")}`+(single&&st.date?` · ${st.date}`:"");
  render();
}

function buildSeasonChips(){
  document.querySelectorAll("#seasons .chip").forEach(c=>{
    c.classList.toggle("on", st.seasons.includes(c.dataset.season));
    c.onclick=async()=>{ const y=c.dataset.season;
      if(st.seasons.includes(y)){ if(st.seasons.length>1) st.seasons=st.seasons.filter(x=>x!==y); }
      else st.seasons.push(y);
      st.set="__all"; save(); buildSeasonChips();
      try{ await loadSeason(); }catch(e){ document.getElementById("sub").innerHTML=`<span class="err">${e.message}</span>`; } };
  });
}

function ebayUrl(r, mode){
  const bits=[r.name, r.parallel, r.card_number].filter(Boolean).join(" ");
  let kw=bits;
  if(mode==="psa10") kw+=" PSA 10";
  else if(mode==="psa9") kw+=" PSA 9";
  else if(mode==="raw") kw+=" -PSA -BGS -CGC";
  let u="https://www.ebay.com/sch/i.html?_nkw="+encodeURIComponent(kw)+"&_sacat=0";
  if(mode!=="active") u+="&LH_Sold=1&LH_Complete=1";
  return u;
}
function openCard(r){
  document.getElementById("sTitle").textContent=`${r.name} · ${r.parallel}`;
  const q=[r.name,r.parallel,r.card_number].filter(Boolean).join(" ");
  const rowKV=(k,v)=>`<div class="k">${k}</div><div class="v">${v}</div>`;
  const body=document.getElementById("sBody");
  const btn=(mode,label,sub)=>`<a class="ebtn" href="${ebayUrl(r,mode)}" target="_blank" rel="noopener"><span>🔎 ${label}</span><small>${sub}</small></a>`;
  const t=trackOf(r), fav=isFav(r);
  const trackHtml=`
    <div class="track">

      <div class="trow"><span>Purchased qty</span>
        <div class="stepper"><button id="qMinus">−</button><input type="number" id="qtyIn" min="0" value="${t?t.qty:0}"><button id="qPlus">+</button></div>
      </div>

      </div>
      ${t?`<button class="clr" id="clrTrack">Clear tracking for this card</button>`:""}
    </div>`;
  body.innerHTML=`
    <div class="kv">
      ${rowKV("Set", shortSet(r.set_name))}
      ${rowKV("Card #", r.card_number||"—")}
      ${rowKV("Gem rate", pct(r.gr))}
      ${rowKV("Pop (10 / total)", (r.gems||0)+" / "+(r.total||0))}
      ${rowKV("Raw", money(r.raw))}
      ${rowKV("PSA 9", money(r.p9))}
      ${rowKV("PSA 10", money(r.p10))}
      ${rowKV("Est. profit", r.profit==null?"—":money(r.profit))}
      ${rowKV("ROI", r.roi==null?"—":Math.round(r.roi*100)+"%")}
      ${rowKV("Volume", num(r.volume)==null?"—":num(r.volume))}
    </div>
    ${r.pc_product?`<div class="prov"><span class="langbadge ${(r.lang||'')}">${(r.lang||'?').toUpperCase()}</span> Priced from <b>${r.pc_console||''}</b> · ${r.pc_product} ${r.price_confidence==='low'?'<span class="lowc">⚠ low-confidence match — verify</span>':'<span class="okc">✓ number-matched</span>'}</div>`:(r.p10!=null?'<div class="prov muted">Source not recorded yet (re-price pending).</div>':'')}
    ${trackHtml}
    <div class="note">Open eBay listings (with photos) in your browser:</div>
    ${btn("psa10","Sold — PSA 10","completed sales")}
    ${btn("psa9","Sold — PSA 9","completed sales")}
    ${btn("raw","Sold — Raw","ungraded")}
    ${btn("active","Active listings","currently for sale")}
    <div class="track">
      <h3>Verify price</h3>
      <button class="ebtn" id="dcBtn">🔍 Double Check on eBay (sold comps)</button>
      <div id="dcResult"></div>
      <button class="ebtn${isInac(r)?" inacon":""}" id="inacBtn">${isInac(r)?"⚠ Marked inaccurate — undo":"⚠ Mark price inaccurate"}</button>
    </div>
  `;
  const refresh=()=>{ render(); openCard(r); };
  document.getElementById("favBtn").onclick=()=>{ toggleFav(r); refresh(); };
  document.getElementById("valBtn").onclick=()=>{ toggleValue(r); refresh(); };
  document.getElementById("qPlus").onclick=()=>{ setQty(r,((trackOf(r)||{}).qty||0)+1); refresh(); };

  document.getElementById("inacBtn").onclick=()=>{ toggleInac(r); refresh(); };
  document.getElementById("dcBtn").onclick=()=>doubleCheck(r);

function closeSide(){ document.getElementById("ov").classList.remove("on"); document.getElementById("side").classList.remove("on"); }
const cardMin=r=>({game:r.game,set_name:r.set_name,card_number:r.card_number,parallel:r.parallel,name:r.name});
async function doubleCheck(r){
  const el=document.getElementById("dcResult");
  if(!sb||!SESSION){ el.innerHTML='<div class="note err">Sign in (top-right) to use Double Check.</div>'; return; }
  el.innerHTML='<div class="note">Searching recent eBay sold comps… (a few seconds)</div>';
  try{
    const {data,error}=await sb.functions.invoke("double-check",{body:{action:"lookup",card:cardMin(r)}});
    if(error) throw new Error(error.message||"lookup failed");
    if(data && data.error) throw new Error(data.error);
    const p=data||{};
    el.innerHTML=`<div class="dcbox">
      <div class="note">eBay sold — PSA 10: <b>${p.psa10!=null?"$"+p.psa10:"—"}</b> (${p.psa10_n||0} comps) · Raw: <b>${p.raw!=null?"$"+p.raw:"—"}</b> (${p.raw_n||0} comps)</div>
      <div class="note">${(p.notes||"").replace(/</g,"&lt;")}</div>
      <div class="arow"><label class="muted">PSA10 $ <input id="dcP10" type="number" value="${p.psa10??""}" class="ain2" style="width:90px"></label>
        <label class="muted">Raw $ <input id="dcRaw" type="number" value="${p.raw??""}" class="ain2" style="width:90px"></label>
        <button class="ebtn primary" id="dcApply" style="width:auto">Update &amp; lock</button></div>
      <div class="note" id="dcStatus"></div></div>`;
    document.getElementById("dcApply").onclick=()=>applyDoubleCheck(r);
  }catch(e){ el.innerHTML='<div class="note err">'+(e.message||e)+'</div>'; }
}
async function applyDoubleCheck(r){
  const s=document.getElementById("dcStatus");
  const psa10=document.getElementById("dcP10").value, raw=document.getElementById("dcRaw").value;
  s.textContent="Saving…";
  try{
    const {data,error}=await sb.functions.invoke("double-check",{body:{action:"apply",card:cardMin(r),prices:{psa10,raw}}});
    if(error) throw new Error(error.message||"save failed");
    if(data && data.error) throw new Error(data.error);
    if(raw!=="") r.raw=+raw; if(psa10!=="") { r.psa10=+psa10; }
    r.price_confidence="manual"; r.pc_console="eBay"; r.pc_product="Double Check (manual)";
    Object.assign(r, enrich(r));
    s.innerHTML='<span class="pos">Saved &amp; locked — the weekly job won\'t override it.</span>';
    render();
  }catch(e){ s.innerHTML='<span class="err">'+(e.message||e)+'</span>'; }
}

async function openFavorites(){
  document.getElementById("fov").classList.add("on"); document.getElementById("fmodal").classList.add("on");
  const body=document.getElementById("fbody");
  const favs=RAW.filter(isFav);
  if(!favs.length){ body.innerHTML='<p class="note">No favorites yet — tap the ☆ star on any card. Favorites ignore the filters; select both year chips to see all of them.</p>'; return; }
  body.innerHTML='<p class="note">Loading new-listing counts…</p>';
  const counts={};
  try{
    const since=new Date(Date.now()-24*3600*1000).toISOString();
    const rows=await rest(`ebay_listings?first_seen=gte.${since}&select=game,set_name,card_number,parallel,grade,first_seen&limit=100000`);
    const s6=Date.now()-6*3600*1000;
    (rows||[]).forEach(x=>{ const k=[x.game,x.set_name,x.card_number,x.parallel].join("¦")+"|"+x.grade;
      const c=counts[k]||(counts[k]={d24:0,h6:0}); c.d24++; if(new Date(x.first_seen).getTime()>=s6) c.h6++; });
  }catch(e){ /* table may not exist yet / no data */ }
  favs.sort((a,b)=>((b.profit==null?-1e9:b.profit)-(a.profit==null?-1e9:a.profit)));
  FAVVIEW=favs;

function renderPurchases(rows){
  const body=document.getElementById("pbody");
  pcolStyle();
  PURCH_ROWS=rows;
  if(!rows.length){ body.innerHTML='<p class="note">No purchased cards yet. eBay buys are matched and appear here automatically.</p>'; return; }
  rows.forEach(r=>{ r.paidN=+r.paid||0; r.profitN=(r.est_profit==null?null:+r.est_profit); });
  const gmap={};
  rows.forEach(r=>{ const k=[r.game,r.set_name,r.card_number,r.parallel].join("¦")||("t:"+(r.item_title||"")); (gmap[k]||(gmap[k]={items:[]})).items.push(r); });
  const groups=Object.values(gmap).map(g=>{
    const items=g.items.slice().sort((a,b)=>String(a.txn_date||"").localeCompare(String(b.txn_date||"")));
    const qty=items.length, avgPaid=items.reduce((s,r)=>s+r.paidN,0)/qty;
    const profs=items.map(r=>r.profitN).filter(v=>v!=null);
    const avgProf=profs.length?profs.reduce((s,v)=>s+v,0)/profs.length:null;   // est_profit is linear in paid
    const roi=(avgProf!=null&&avgPaid>0)?avgProf/avgPaid:null;
    return {items,qty,avgPaid,avgProf,roi,rep:items[0],first:items[0].txn_date};
  });
  groups.sort((a,b)=>((b.avgProf==null?-1e9:b.avgProf)-(a.avgProf==null?-1e9:a.avgProf)));
  PURCH=groups;
  const spent=rows.reduce((s,r)=>s+r.paidN,0), proj=rows.reduce((s,r)=>s+(r.profitN||0),0);
  const priced=rows.filter(r=>r.profitN!=null);   // both PSA9 + PSA10 known
  const allP9=priced.reduce((s,r)=>s+(+r.psa9*0.88-82-r.paidN),0);   // worst case: every card grades PSA 9
  const allP10=priced.reduce((s,r)=>s+(+r.psa10*0.88-82-r.paidN),0); // best case: every card grades PSA 10
  const gemsA=priced.map(r=>Math.min(1,Math.max(0,+r.gem_rate||0)));
  const avgGem=gemsA.length?gemsA.reduce((s,g)=>s+g,0)/gemsA.length:null;
  // Monte Carlo: probability the realized profit meets or beats the expected estimate
  let pHit=null;
  if(priced.length){
    const p10=priced.map(r=>+r.psa10*0.88-82-r.paidN), p9=priced.map(r=>+r.psa9*0.88-82-r.paidN);
    const T=20000; let hits=0;
    for(let t=0;t<T;t++){ let s=0; for(let i=0;i<gemsA.length;i++) s+=(Math.random()<gemsA[i])?p10[i]:p9[i]; if(s>=proj-1e-6) hits++; }
    pHit=hits/T;
  }
  const T={totQty:groups.reduce((s,g)=>s+g.qty,0), spent, totPSA9:groups.reduce((s,g)=>s+((+g.rep.psa9||0)*g.qty),0), totPSA10:groups.reduce((s,g)=>s+((+g.rep.psa10||0)*g.qty),0), proj, totRoi:spent>0?proj/spent:null};
  const cols=PL.order.map(k=>PCOLDEF.find(c=>c.key===k)).filter(c=>c && !PL.hidden[c.key]);

  const menu=PL.order.map(k=>{ const c=PCOLDEF.find(x=>x.key===k); return `<label class="pcitem"><input type="checkbox" data-col="${k}" ${PL.hidden[k]?"":"checked"}> ${c.label}</label>`; }).join("");
  let h=`<div class="ptools"><div class="psum"><span>${rows.length} cards · ${groups.length} unique</span><span>Spent: ${money2(spent)}</span><span title="Simulated chance the actual outcome meets or beats this estimate (each card gems independently at its gem rate)">Est. profit if graded/sold: <span class="${proj>=0?'pos':'neg'}">${money2(proj)}</span> <span class="muted">(avg gem ${avgGem==null?'—':Math.round(avgGem*100)+'%'} · ${pHit==null?'—':Math.round(pHit*100)+'%'} chance to hit or beat)</span></span><span title="If every card graded PSA 9">Worst case · all PSA 9: <span class="${allP9>=0?'pos':'neg'}">${money2(allP9)}</span></span><span title="If every card graded PSA 10">Best case · all PSA 10: <span class="${allP10>=0?'pos':'neg'}">${money2(allP10)}</span></span></div>`;
  h+=`<div class="pcolwrap"><button class="pbtn" id="pcolBtn">⚙ Columns ▾</button><div class="pcmenu" id="pcolMenu" style="display:none"><div class="pchint">Show / hide · drag headers to reorder</div>${menu}<button class="pbtn" id="pcolReset" style="margin-top:6px;width:100%">Reset layout</button></div></div></div>`;

  h+='<div class="tablewrap"><table class="ptbl"><thead><tr><th class="pcx"></th>'+cols.map(c=>`<th draggable="true" data-key="${c.key}"${PL.widths[c.key]?` style="width:${PL.widths[c.key]}px"`:""}>${c.label}</th>`).join("")+'</tr></thead><tbody>';
  h+=`<tr class="ptot" style="font-weight:600;background:#eef1fb"><td></td>`+cols.map(c=>`<td>${c.key==="card"?`TOTALS <span class="muted">(${groups.length} unique)</span>`:(c.t?c.t(T):"")}</td>`).join("")+`</tr>`;
  groups.forEach((g,gi)=>{
    const caret=g.qty>1?`<span class="caret" style="cursor:pointer">▸</span>`:"";
    h+=`<tr class="grow" data-gi="${gi}" style="cursor:pointer"><td>${caret}</td>`+cols.map(c=>`<td>${c.g(g)}</td>`).join("")+`</tr>`;
    g.items.forEach((it,ii)=>{
      h+=`<tr class="girow" data-gi="${gi}" data-ii="${ii}" hidden style="background:#fafbff;cursor:pointer"><td></td>`+cols.map(c=>`<td${c.key==="card"?' style="padding-left:22px"':''}>${c.i?c.i(it):""}</td>`).join("")+`</tr>`;
    });
  });
  h+='</tbody></table></div>';
  body.innerHTML=h;

  const table=body.querySelector("table.ptbl");
  makeResizable(table,(k,w)=>{ PL.widths[k]=w; savePL(PL); });
  body.querySelectorAll("input.itemin").forEach(inp=>inp.addEventListener("change",()=>saveItemId(inp.dataset.txn, inp.value)));

  // drag-to-reorder columns
  let dragKey=null;
  table.querySelectorAll("thead th[data-key]").forEach(th=>{
    th.addEventListener("dragstart",e=>{ dragKey=th.dataset.key; e.dataTransfer.effectAllowed="move"; });
    th.addEventListener("dragover",e=>{ e.preventDefault(); th.style.boxShadow="inset 3px 0 0 #5566ff"; });
    th.addEventListener("dragleave",()=>{ th.style.boxShadow=""; });
    th.addEventListener("drop",e=>{ e.preventDefault(); th.style.boxShadow=""; const tgt=th.dataset.key;
      if(!dragKey||dragKey===tgt) return;
      const o=PL.order.slice(); o.splice(o.indexOf(dragKey),1); o.splice(o.indexOf(tgt),0,dragKey);
      PL.order=o; savePL(PL); renderPurchases(PURCH_ROWS); });
  });

  // columns show/hide menu
  const btn=body.querySelector("#pcolBtn"), mnu=body.querySelector("#pcolMenu");
  if(btn) btn.onclick=()=>{ mnu.style.display=mnu.style.display==="none"?"block":"none"; };
  body.querySelectorAll("#pcolMenu input[data-col]").forEach(cb=>cb.onchange=()=>{ PL.hidden[cb.dataset.col]=!cb.checked; savePL(PL); renderPurchases(PURCH_ROWS); body.querySelector("#pcolMenu").style.display="block"; });
  const rst=body.querySelector("#pcolReset");
  if(rst) rst.onclick=()=>{ PL={order:PCOLDEF.map(c=>c.key),hidden:{},widths:{}}; savePL(PL); renderPurchases(PURCH_ROWS); };

  const tb=body.querySelector("tbody");
  if(tb) tb.addEventListener("click",e=>{
    if(e.target.closest("a")||e.target.closest("input")) return;   // let links & item-# inputs through
    const gr=e.target.closest("tr.grow");
    if(gr){ const g=PURCH[+gr.dataset.gi];
      if(g.qty<=1){ openPurchasedCard(g.rep); return; }
      const kids=body.querySelectorAll(`tr.girow[data-gi="${gr.dataset.gi}"]`);

    }
    const ir=e.target.closest("tr.girow");
    if(ir){ openPurchasedCard(PURCH[+ir.dataset.gi].items[+ir.dataset.ii]); }
  });
}

function findCard(term){
  term=(term||"").trim().toLowerCase(); if(!term) return null;
  let c=RAW.find(x=>((x.name+" "+(x.parallel||"")+" #"+x.card_number).toLowerCase())===term);
  if(c) return c;
  const toks=term.split(/[\s|]+/).filter(Boolean);
  const cands=RAW.filter(x=>{const s=(x.name+" "+(x.parallel||"")+" "+x.card_number).toLowerCase(); return toks.every(t=>s.includes(t));});
  return cands.length?cands[0]:null;
}
async function addPurchase(card, price, date, qty, itemId){
  const title=`${card.name} ${card.parallel||""} #${card.card_number} (manual)`.replace(/\s+/g," ").trim();
  const {error}=await sb.from("card_transactions").insert({user_id:SESSION.user.id,type:"buy",txn_date:date||null,
    price:(price!=null&&price!=="")?+price:null,item_title:title,ebay_order_id:null,email_id:null,
    ebay_item_id:(itemId||"").replace(/[^0-9]/g,"")||null,
    game:card.game,set_name:card.set_name,card_number:card.card_number,parallel:card.parallel,matched:true,confidence:"manual"});
  if(error) throw new Error(error.message);
  const k=keyOf(card); const t=TRACK[k]||{qty:0,stage:""}; t.qty=(t.qty||0)+(+qty||1); t.stage="purchased"; TRACK[k]=t; saveTrack();
  await syncCard(card);
}
async function addSingle(){
  const st=document.getElementById("astatus");

  try{
    await addPurchase(card, document.getElementById("aprice").value, document.getElementById("adate").value, document.getElementById("aqty").value, (document.getElementById("aitem")||{}).value);
    document.getElementById("acard").value=""; document.getElementById("aprice").value="";

}
async function addBulk(){
  const st=document.getElementById("astatus");
  const lines=document.getElementById("abulktext").value.split("\n").map(l=>l.trim()).filter(Boolean);
  let ok=0; const bad=[];
  for(const line of lines){
    const p=line.split("|").map(s=>s.trim());
    const card=findCard(p[0]);
    if(!card){ bad.push(p[0]); continue; }
    try{ await addPurchase(card, p[1], p[2], 1); ok++; }catch(e){ bad.push(p[0]); }
  }
  st.innerHTML=`<span class="pos">Added ${ok}.</span>`+(bad.length?` <span class="err">No match: ${bad.join("; ")}</span>`:"");
  if(ok) openPurchases();
}

    document.getElementById("purchasedBtn").onclick=openPurchases;
    document.getElementById("pClose").onclick=closePurchases;
    document.getElementById("pov").onclick=closePurchases;
    document.getElementById("addPurchaseBtn").onclick=openAddForm;
    document.getElementById("favBtnTop").onclick=openFavorites;
    document.getElementById("fClose").onclick=closeFav;
    document.getElementById("fov").onclick=closeFav;
    document.querySelector("#tbl tbody").addEventListener("click",e=>{
      const tr=e.target.closest("tr[data-i]"); if(!tr) return;
      const r=VIEW[+tr.dataset.i]; if(!r) return;
      if(e.target.closest(".valmark")){ toggleValue(r); render(); return; }
      if(e.target.closest(".star")){ toggleFav(r); render(); return; }
      openCard(r);
    });
    await loadSeason();
  }catch(err){
    document.getElementById("sub").innerHTML=`<span class="err">Couldn't load data: ${err.message}. Use the Reload button after the connector is ready.</span>`;
  }
}
boot();
</script>
</body>
</html>
